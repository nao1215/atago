name: Coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# octocov needs to read/write the Actions-artifact datastore (report/diff in
# .octocov.yml) and comment coverage on pull requests. The repo's default token
# permissions are read-only, which makes those API calls 403, so grant the
# needed scopes explicitly here.
permissions:
  contents: read
  actions: write
  pull-requests: write

jobs:
  coverage:
    name: Coverage (unit + e2e)

    strategy:
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          check-latest: true

      # Combines unit-test coverage with self-hosted E2E coverage (E2E runs a
      # `go build -cover` atago and collects covdata via GOCOVERDIR), then
      # merges both into cover.out. git is preinstalled on the runner, which is
      # all the atago + git E2E suites need.
      - name: Run combined unit + E2E coverage
        run: make coverage

      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: .octocov.yml
          work-dir: .
          args: --report=cover.out
