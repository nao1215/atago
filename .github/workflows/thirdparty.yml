name: ThirdParty

# Runs atago against third-party programs nobody here maintains: self-hosted
# servers from awesome-selfhosted (started as background services and queried
# through the http runner) and other programs installable with one command.
# The git suite is push-gated in e2e.yml and a pinned caddy runs in the PR
# gate (e2e.yml e2e-representative); these depend on external modules/releases,
# so like the dogfood matrix they run on a schedule and on demand to keep the
# required push checks fast and deterministic. Each program is its own matrix
# leg so a failure localizes to one external dependency. Every external tool is
# pinned deliberately: `go install` legs pin a module version (integrity still
# comes from the Go checksum database), and raw binary-download legs pin a
# version + SHA256 because a CDN download has no implicit integrity check.
on:
  workflow_dispatch:
  schedule:
    # 06:30 UTC daily, after the dogfood matrix.
    - cron: "30 6 * * *"

permissions:
  contents: read

jobs:
  thirdparty:
    name: thirdparty (${{ matrix.program.name }})
    # Keep the base distro fixed too: the pinned Ubuntu snapshot below targets
    # noble's package set, so a future ubuntu-latest rollover cannot silently
    # change third-party tool versions.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ATAGO_UBUNTU_SNAPSHOT_ID: 20260721T000000Z
    strategy:
      fail-fast: false
      matrix:
        program:
          - name: caddy
            dir: ./test/e2e/thirdparty/caddy
            install: go install github.com/caddyserver/caddy/v2/cmd/caddy@v2.11.4
          - name: pushgateway
            dir: ./test/e2e/thirdparty/pushgateway
            install: go install github.com/prometheus/pushgateway@v1.11.3
          - name: webhook
            dir: ./test/e2e/thirdparty/webhook
            install: go install github.com/adnanh/webhook@v0.0.0-20260212225928-857e708f87a6
          # Ubuntu-packaged tools are always installed from a pinned noble
          # snapshot so their versions do not drift with runner-image refreshes
          # or moving apt repositories.
          - name: jq
            dir: ./test/e2e/thirdparty/jq
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh jq
          - name: openssl
            dir: ./test/e2e/thirdparty/openssl
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh openssl
          - name: sqlite3
            dir: ./test/e2e/thirdparty/sqlite3
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh sqlite3
          - name: fzf
            dir: ./test/e2e/thirdparty/fzf
            install: go install github.com/junegunn/fzf@v0.74.0
          # htop drives the pty runner's alternate-screen rendering and named
          # function keys.
          - name: htop
            dir: ./test/e2e/thirdparty/htop
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh htop
          - name: redis
            dir: ./test/e2e/thirdparty/redis
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh redis-server redis-tools
          - name: hugo
            dir: ./test/e2e/thirdparty/hugo
            install: go install github.com/gohugoio/hugo@v0.164.0
          - name: restic
            dir: ./test/e2e/thirdparty/restic
            install: go install github.com/restic/restic/cmd/restic@v0.19.1
          - name: rclone
            dir: ./test/e2e/thirdparty/rclone
            install: go install github.com/rclone/rclone@v1.74.4
          - name: minio
            dir: ./test/e2e/thirdparty/minio
            install: |
              go install github.com/minio/minio@RELEASE.2025-07-18T21-56-31Z
              go install github.com/minio/mc@RELEASE.2025-07-21T05-28-08Z
          # The AWS CLI is driven against a local MinIO S3 endpoint (#32): a
          # cloud CLI tested with no cloud account, fully offline. minio is the
          # server; the AWS CLI itself comes from the official pinned v2 bundle
          # because Ubuntu's awscli package disappeared from the noble snapshot.
          - name: awscli
            dir: ./test/e2e/thirdparty/awscli
            install: |
              go install github.com/minio/minio@RELEASE.2025-07-18T21-56-31Z
              bash ./scripts/install_awscli_pinned.sh
          # The pty scenarios exercise the real CPython REPL.
          - name: python
            dir: ./test/e2e/thirdparty/python
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh python3
          # ssh-keygen is provided by openssh-client from the pinned snapshot.
          - name: ssh-keygen
            dir: ./test/e2e/thirdparty/ssh-keygen
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh openssh-client
          # ffmpeg (with ffprobe) synthesizes tiny test video and extracts
          # frames.
          - name: ffmpeg
            dir: ./test/e2e/thirdparty/ffmpeg
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh ffmpeg
          # pandoc converts documents (md/html/docx/json AST).
          - name: pandoc
            dir: ./test/e2e/thirdparty/pandoc
            install: bash ./scripts/install_ubuntu_snapshot_packages.sh pandoc
          # Terraform comes from the official HashiCorp release archive instead
          # of a moving apt repository. Only the builtin terraform_data
          # resource is used, so `init` downloads no providers and the suite
          # stays fully offline.
          # age (and age-keygen) — the Go-native encryption CLI, go-installed.
          - name: age
            dir: ./test/e2e/thirdparty/age
            install: |
              go install filippo.io/age/cmd/age@v1.3.1
              go install filippo.io/age/cmd/age-keygen@v1.3.1
          # kustomize renders Kubernetes manifests offline and deterministically
          # (build/create/edit); go-installed from the kustomize module.
          - name: kustomize
            dir: ./test/e2e/thirdparty/kustomize
            install: go install sigs.k8s.io/kustomize/kustomize/v5@v5.8.1
          # actionlint statically lints GitHub Actions workflows offline; the
          # specs disable shellcheck so results do not depend on its presence.
          - name: actionlint
            dir: ./test/e2e/thirdparty/actionlint
            install: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          # sops encrypts structured files with age as the key backend; both are
          # go-installed (age and age-keygen provide the throwaway keys).
          - name: sops
            dir: ./test/e2e/thirdparty/sops
            install: |
              go install github.com/getsops/sops/v3/cmd/sops@v3.13.2
              go install filippo.io/age/cmd/age@v1.3.1
              go install filippo.io/age/cmd/age-keygen@v1.3.1
          # aqua is a declarative CLI version manager; the suite runs a real
          # `aqua install` from a local registry + local HTTP file server (python3
          # ships on the runner) and its offline surface. v2.61.0 raised its
          # minimum Go toolchain to 1.26.5, so pin v2.60.2 to stay compatible
          # with this repo's current Go setup while still testing a recent aqua.
          - name: aqua
            dir: ./test/e2e/thirdparty/aqua
            install: go install github.com/aquaproj/aqua/v2/cmd/aqua@v2.60.2
          # ecspresso deploys ECS services. The suite renders offline AND runs a
          # real deploy against moto (an in-memory AWS mock, pip-installed) with
          # the same pinned AWS CLI v2 bundle observing the ECS state.
          - name: ecspresso
            dir: ./test/e2e/thirdparty/ecspresso
            install: |
              go install github.com/kayac/ecspresso/v2/cmd/ecspresso@v2.8.5
              pipx install 'moto[server]==5.2.2'
              bash ./scripts/install_awscli_pinned.sh
          - name: terraform
            dir: ./test/e2e/thirdparty/terraform
            install: |
              ver="1.12.2"
              sha256="1eaed12ca41fcfe094da3d76a7e9aa0639ad3409c43be0103ee9f5a1ff4b7437"
              curl -fsSL "https://releases.hashicorp.com/terraform/${ver}/terraform_${ver}_linux_amd64.zip" -o terraform.zip
              echo "${sha256}  terraform.zip" | sha256sum -c -
              unzip -o terraform.zip terraform
              install terraform "$(go env GOPATH)/bin/terraform"
          # The suite queries the DNS server with dig from the pinned snapshot.
          - name: coredns
            dir: ./test/e2e/thirdparty/coredns
            install: |
              go install github.com/coredns/coredns@v1.14.6
              bash ./scripts/install_ubuntu_snapshot_packages.sh bind9-dnsutils
          - name: nats
            dir: ./test/e2e/thirdparty/nats
            install: |
              go install github.com/nats-io/nats-server/v2@v2.14.3
              go install github.com/nats-io/natscli/nats@v0.4.0
          - name: mailpit
            dir: ./test/e2e/thirdparty/mailpit
            install: go install github.com/axllent/mailpit@v1.30.4
          - name: transfersh
            dir: ./test/e2e/thirdparty/transfersh
            install: go install github.com/dutchcoders/transfer.sh@v1.6.1
          # Gotify compiles its web UI into the binary, so `go install` cannot
          # build it; pinned release zip + SHA256. Gotify publishes no checksum
          # sidecars, so this SHA was recorded from a verified download
          # (trust-on-first-use) — a changed artifact fails loudly here.
          - name: gotify
            dir: ./test/e2e/thirdparty/gotify
            install: |
              ver="2.9.1"
              sha256="34707b68f6e2b1be69458a7974e9d0e1acbfaa7a95d7349eed9219c9f215c4b3"
              curl -fsSL "https://github.com/gotify/server/releases/download/v${ver}/gotify-linux-amd64.zip" -o gotify.zip
              echo "${sha256}  gotify.zip" | sha256sum -c -
              unzip -o gotify.zip gotify-linux-amd64
              install gotify-linux-amd64 "$(go env GOPATH)/bin/gotify"
          # Grafana ships its runtime assets next to the binary, so the whole
          # distribution is extracted and GF_PATHS_HOME points at it (the suite
          # passes it as --homepath). Pinned version + SHA256 (upstream
          # publishes the .sha256 next to the tarball).
          - name: grafana
            dir: ./test/e2e/thirdparty/grafana
            install: |
              ver="13.1.0"
              sha256="4f562bb224b8bb758b47789381babb284cb41687da8d714f2ff0e118e945e775"
              curl -fsSL "https://dl.grafana.com/oss/release/grafana-${ver}.linux-amd64.tar.gz" -o grafana.tar.gz
              echo "${sha256}  grafana.tar.gz" | sha256sum -c -
              tar -xzf grafana.tar.gz -C "$HOME"
              echo "GF_PATHS_HOME=$HOME/grafana-${ver}" >> "$GITHUB_ENV"
              echo "$HOME/grafana-${ver}/bin" >> "$GITHUB_PATH"
          # Prometheus cannot be `go install`ed (its go.mod uses replace
          # directives), so the official release tarball provides prometheus
          # and promtool. Unlike the `go install` legs (whose module downloads
          # the Go toolchain hash-verifies against the checksum database),
          # a raw binary download has no implicit integrity check — so the
          # version AND its SHA256 are pinned here, and the download must
          # match before it touches PATH. Bump both together (the SHA lives in
          # the upstream release's sha256sums.txt).
          - name: prometheus
            dir: ./test/e2e/thirdparty/prometheus
            install: |
              ver="3.13.0"
              sha256="744d93324cc024d82089921737bd797474d7f1e5dbbfd1c6b387bad258538cb9"
              curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${ver}/prometheus-${ver}.linux-amd64.tar.gz" -o prometheus.tar.gz
              echo "${sha256}  prometheus.tar.gz" | sha256sum -c -
              tar -xzf prometheus.tar.gz
              install "prometheus-${ver}.linux-amd64/prometheus" "prometheus-${ver}.linux-amd64/promtool" "$(go env GOPATH)/bin/"
          # Gitea ships a single prebuilt binary (building from source needs a
          # frontend toolchain). Same rule as prometheus: pinned version +
          # pinned SHA256, verified before install (upstream publishes
          # gitea-<ver>-linux-amd64.sha256 next to the binary).
          - name: gitea
            dir: ./test/e2e/thirdparty/gitea
            install: |
              ver="1.26.4"
              sha256="0faa36d151918f8f7d6e0f3ae67597d1c338583d695add146ac393109d0fc44a"
              curl -fsSL "https://dl.gitea.com/gitea/${ver}/gitea-${ver}-linux-amd64" -o gitea
              echo "${sha256}  gitea" | sha256sum -c -
              install gitea "$(go env GOPATH)/bin/gitea"
          # ntfy cannot be `go install`ed either (replace directives); pinned
          # release tarball + SHA256 (from the upstream checksums.txt), same
          # rule as prometheus/gitea.
          - name: ntfy
            dir: ./test/e2e/thirdparty/ntfy
            install: |
              ver="2.25.0"
              sha256="628bc8d3ad73778484ae1c6116e7745ef5fa414619567e6b4c2581927c355b1e"
              curl -fsSL "https://github.com/binwiederhier/ntfy/releases/download/v${ver}/ntfy_${ver}_linux_amd64.tar.gz" -o ntfy.tar.gz
              echo "${sha256}  ntfy.tar.gz" | sha256sum -c -
              tar -xzf ntfy.tar.gz
              install "ntfy_${ver}_linux_amd64/ntfy" "$(go env GOPATH)/bin/"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Build atago
        run: go build -o ./dist/atago .

      - name: Install ${{ matrix.program.name }} onto PATH
        run: |
          set -e
          mkdir -p "$(go env GOPATH)/bin"
          ${{ matrix.program.install }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run the ${{ matrix.program.name }} suite
        run: ./dist/atago run "${{ matrix.program.dir }}"
