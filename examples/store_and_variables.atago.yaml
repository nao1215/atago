version: "1"

# store captures a value from a previous step (JSONPath or regex on stdout, a
# file, an HTTP header, ...) and later steps reference it as ${name}.
# ${workdir} is built in: the scenario's isolated temp directory.
# ${env:NAME} reads the host environment — for injecting a CI-provided value
# (a token, a staging URL) into fields no shell ever touches.
# Runs green as-is: atago run examples/store_and_variables.atago.yaml

suite:
  name: store and variables

scenarios:
  - name: capture a value and reuse it
    steps:
      - fixture:
          file: user.json
          content: |
            {"id":7,"name":"ada"}
      - store:
          name: user_id
          from:
            file:
              path: user.json
              json:
                path: "$.id"
      - run:
          shell: true
          command: echo fetched user ${user_id}
      - assert:
          stdout:
            contains: fetched user 7

  - name: capture by regex from stdout
    steps:
      - run:
          shell: true
          command: echo build 1.2.3 done
      - store:
          name: version
          from:
            stdout:
              matches: "[0-9]+\\.[0-9]+\\.[0-9]+"
      - run:
          shell: true
          command: echo releasing ${version}
      - assert:
          stdout:
            equals: releasing 1.2.3

  - name: capture a whole opaque value with trim, no regex
    steps:
      # For an opaque single value (a token, an id, a signed blob) there is
      # nothing to match — trim: true captures the entire stdout and drops the
      # trailing newline, so you no longer need a whole-string regex.
      - run:
          shell: true
          command: echo opaque-token-xyz
      - store:
          name: token
          from:
            stdout:
              trim: true
      - run:
          shell: true
          command: echo using ${token}
      - assert:
          stdout:
            equals: using opaque-token-xyz

  - name: capture a whole file verbatim with text
    steps:
      - fixture:
          file: token.bin
          content: "signed-blob-9f8e"
      # text: true reads the whole file content into the variable verbatim,
      # without a json path — the natural way to grab an opaque file value.
      - store:
          name: blob
          from:
            file:
              path: token.bin
              text: true
      - run:
          shell: true
          command: echo verifying ${blob}
      - assert:
          stdout:
            equals: verifying signed-blob-9f8e

  - name: read the host environment with env
    steps:
      # ${env:NAME} expands from the invoking environment — unlike shell `$VAR`
      # it also works in fields no shell touches (an http runner's base_url or
      # headers, a db dsn, ssh credentials). An unset variable is an error, not
      # an empty string. PATH is set on every OS, so this runs green as-is.
      - run:
          shell: true
          command: echo path is ${env:PATH}
      - assert:
          stdout:
            not_matches: "^path is $"

  - name: write a literal ${...} with the $$ escape
    steps:
      # $${name} renders as the literal text ${name} without expansion — for a
      # fixture that is itself a template (or another atago spec).
      - fixture:
          file: template.txt
          content: |
            greeting is $${greeting}
      - assert:
          file:
            path: template.txt
            contains: greeting is ${greeting}
