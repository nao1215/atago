version: "1"

# Run a command and assert on what a user observes: exit code, stdout, stderr.
# Runs green as-is: atago run examples/run_and_assert.atago.yaml

suite:
  name: run and assert

scenarios:
  - name: one assert can check several targets at once
    steps:
      - run:
          shell: true
          command: echo hello atago
      # Each target is an independent check; all must hold.
      - assert:
          exit_code: 0
          stdout:
            contains: hello
          stderr:
            empty: true

  - name: matchers beyond contains
    steps:
      - run:
          shell: true
          command: echo alpha beta
      - assert:
          stdout:
            equals: alpha beta
      # not_equals is the exact-text negation: assert the output is anything
      # BUT the given text — a trailing-newline-insensitive inequality.
      - assert:
          stdout:
            not_equals: gamma delta
      - assert:
          stdout:
            matches: "a.+a"
      # not_matches is the regexp negation: assert a pattern never appears —
      # e.g. that output carries no warning/error lines.
      - assert:
          stdout:
            not_matches: "(?i)warn|error"
      # A list is a single matcher: every element must be present (contains)
      # or absent (not_contains).
      - assert:
          stdout:
            contains:
              - alpha
              - beta
      - assert:
          stdout:
            not_contains: [panic, fatal]

  - name: negative exit code and line selection
    steps:
      - run:
          shell: true
          command: echo first
      - assert:
          exit_code:
            not: 1
      # line narrows the stream to a single 1-based line before matching.
      - assert:
          stdout:
            line: 1
            equals: first

  - name: exit code sets match a documented contract
    steps:
      # Real CLIs define exit-code SETS as their contract: grep exits 0 or 1
      # without error, terraform plan -detailed-exitcode exits 0 (clean) or 2
      # (changes). `in:` asserts membership in the accepted set (#19).
      - run:
          shell: true
          command: exit 2
      - assert:
          exit_code:
            in: [0, 2]
