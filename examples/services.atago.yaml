version: "1"

# services start a background process before the steps and tear it down when
# the scenario ends. A ready probe (file / port / log / delay) gates the steps;
# ready.store captures a value the service publishes — typically the address it
# bound — into a ${var}.
# Runs green as-is on POSIX: atago run examples/services.atago.yaml

suite:
  name: services

scenarios:
  - name: client waits for the service and reads its response
    skip:
      os: windows   # the stand-in service below uses POSIX shell commands
    services:
      - name: server
        shell: true
        # A stand-in server: publish the bound address, respond a moment
        # later, keep running until teardown. A real server would be your
        # binary, with ready: {port: 127.0.0.1:8080} or ready: {log: REGEXP}.
        command: |
          echo "127.0.0.1:8000" > addr.txt
          sleep 1
          echo "pong" > response.txt
          sleep 30
        ready:
          file: addr.txt   # ready when this file exists and is non-empty
          store: addr      # its trimmed content becomes ${addr}
          timeout: 5s
    steps:
      - run:
          shell: true
          command: echo client would connect to ${addr}
      - assert:
          stdout:
            contains: "127.0.0.1:8000"
      # Poll the service's response the way you would poll a real endpoint.
      - run:
          shell: true
          command: cat response.txt
          retry:
            times: 20
            interval: 100ms
            until:
              stdout:
                contains: pong
      - assert:
          stdout:
            contains: pong

  - name: a chatty service keeps only its newest log bytes
    skip:
      os: windows   # the stand-in service below uses POSIX shell commands
    services:
      - name: chatty
        shell: true
        # A service that logs heavily. atago retains at most max_log_bytes of
        # its combined stdout/stderr (default 8 MiB), dropping the OLDEST
        # bytes first — readiness excerpts and preserved log artifacts only
        # ever need the tail, and this keeps a verbose server from growing
        # memory for the whole suite's lifetime.
        command: |
          i=0
          while [ $i -lt 100 ]; do echo "debug: request $i handled"; i=$((i+1)); done
          echo "server listening"
          sleep 30
        max_log_bytes: 1024
        ready:
          log: "server listening"   # matches in the retained tail
          timeout: 5s
    steps:
      - run:
          shell: true
          command: echo service is up
      - assert:
          exit_code: 0
          stdout:
            contains: service is up
