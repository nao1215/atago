version: "1"

# image decodes an output file and checks observable properties: sniffed
# format, dimensions, alpha, and pixel similarity against a baseline
# (similar_to / max_diff). pdf checks page count, Info metadata, and extracted
# text. Every set field is an independent constraint; all must hold.
# Runs green as-is: atago run examples/image_and_pdf.atago.yaml

suite:
  name: image and pdf

scenarios:
  - name: image format, dimensions, and alpha
    steps:
      # Stand-in for your tool's output: a 1x1 semi-transparent PNG fixture.
      - fixture:
          file: out.png
          base64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR4nGNocFBoAAADhQFhC+q+qAAAAABJRU5ErkJggg==
      - assert:
          image:
            path: out.png
            format: png    # sniffed from content: png/jpeg/gif/webp/bmp/tiff/avif/svg
            width: 1
            height: 1
            alpha: true

  - name: pdf pages, metadata, and text
    steps:
      - fixture:
          file: report.pdf
          content: |
            %PDF-1.4
            1 0 obj
            << /Type /Catalog /Pages 2 0 R >>
            endobj
            2 0 obj
            << /Type /Pages /Kids [3 0 R] /Count 1 >>
            endobj
            3 0 obj
            << /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Contents 4 0 R >>
            endobj
            4 0 obj
            << /Length 46 >>
            stream
            BT /F1 24 Tf 72 700 Td (Quarterly earnings) Tj ET
            endstream
            endobj
            6 0 obj
            << /Title (Quarterly Report) /Author (atago) >>
            endobj
            trailer
            << /Root 1 0 R /Info 6 0 R >>
            %%EOF
      - assert:
          pdf:
            path: report.pdf
            pages: 1
            metadata:
              title: Quarterly
            text:
              contains: Quarterly earnings
