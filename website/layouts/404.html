{{ define "main" }}
<article>
<h1>{{ site.Params.ui.notFoundTitle }}</h1>
{{ if eq site.Language.Lang "ja" }}
<p>このアドレスにページはありません。<a href="{{ site.Home.RelPermalink }}">トップページ</a>から辿ってください。</p>
{{ else }}
<p>No page lives at this address. Start from the <a href="{{ site.Home.RelPermalink }}">front page</a>.</p>
{{ end }}
</article>
{{ end }}
