{{ define "main" }}
<div class="page{{ if .Params.toc }} has-toc{{ end }}">
{{ if .Params.toc }}
<aside class="sidebar" aria-label="{{ site.Params.ui.onThisPage }}">
<div class="sidebar-inner">
{{ if .Params.filter }}<input type="search" class="toc-filter" placeholder="{{ site.Params.ui.filterPlaceholder }}" aria-label="{{ site.Params.ui.filterAriaLabel }}" autocomplete="off">{{ end }}
<nav class="toc-nav">{{ .TableOfContents }}</nav>
</div>
</aside>
{{ end }}
<article>
<h1>{{ .Title }}</h1>
{{ if .Params.toc }}
<details class="toc toc-inline">
<summary>{{ site.Params.ui.onThisPage }}</summary>
{{ .TableOfContents }}
</details>
{{ end }}
{{ .Content }}
</article>
</div>
{{ end }}
