# pty steps (#8): a real pseudo-terminal with a declarative expect/send
# session. POSIX-only; every scenario here skips on Windows.
version: "1"

suite:
  name: atago self-hosting / pty

scenarios:
  - name: a pty step sees a terminal where a run step sees a pipe
    skip:
      os: windows
    steps:
      - fixture:
          file: tty.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: tty
                steps:
                  - pty:
                      shell: true
                      command: 'if [ -t 0 ]; then echo saw-a-tty; else echo saw-a-pipe; fi'
                  - assert:
                      exit_code: 0
                      stdout:
                        contains: saw-a-tty
      - run:
          command: ${atago} run tty.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: a never-matching expect fails with the pattern in the block
    skip:
      os: windows
    steps:
      - fixture:
          file: bad.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: waits forever
                steps:
                  - pty:
                      command: cat
                      timeout: 2s
                      session:
                        - expect: "prompt-that-never-comes"
      - run:
          command: ${atago} run bad.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains:
              - "pty expect /prompt-that-never-comes/"
              - "never appeared in the terminal transcript"

  - name: named keys transmit their documented bytes and ctrl-c aborts
    skip:
      os: windows
    steps:
      # An arrow key received by `cat -v` renders as ^[[B — proof the named
      # key (#26) transmitted the real xterm sequence.
      - pty:
          command: cat -v
          timeout: 10s
          session:
            - send: { key: down }
            - send: { key: enter }
            - expect: '\^\[\[B'
            - send: { key: ctrl-d }
      - assert:
          exit_code: 0
          stdout:
            contains: "^[[B"
      # ctrl-c delivers a real SIGINT to the foreground process group.
      - pty:
          shell: true
          command: "trap 'exit 130' INT; echo waiting; while true; do sleep 0.1; done"
          timeout: 10s
          session:
            - expect: waiting
            - send: { key: ctrl-c }
      - assert:
          exit_code: 130

  - name: an unknown key name is a load-time error listing the vocabulary
    steps:
      - fixture:
          file: badkey.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: typo'd key
                steps:
                  - pty:
                      command: cat
                      session:
                        - send: { key: entr }
      - run:
          command: ${atago} run badkey.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains: 'not a supported key (supported: enter, tab'

  - name: screen asserts see the final frame where the transcript sees history
    skip:
      os: windows
    steps:
      # An overwritten progress line (#27): the rendered screen holds only
      # the final text; the raw transcript still carries both versions.
      - pty:
          shell: true
          command: "printf 'loading...\r'; printf 'done.      \r\n'"
          rows: 10
          cols: 40
      - assert:
          screen:
            line: 1
            equals: "done."
      - assert:
          screen:
            not_contains: loading
      - assert:
          stdout:
            contains: loading

  - name: a screen snapshot round-trips through update and compare
    skip:
      os: windows
    steps:
      - fixture:
          file: inner.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: menu frame
                steps:
                  - pty:
                      shell: true
                      command: "printf '\\033[2J\\033[HMain Menu\\r\\n> Settings\\r\\n'"
                      rows: 10
                      cols: 40
                  - assert:
                      screen:
                        snapshot: snapshots/menu.txt
      - run:
          command: ${atago} run --update-snapshots inner.atago.yaml
      - assert:
          exit_code: 0
          file:
            path: snapshots/menu.txt
            contains: "> Settings"
      - run:
          command: ${atago} run inner.atago.yaml
      - assert:
          exit_code: 0

  - name: a screen assert without a pty step is a load-time error
    steps:
      - fixture:
          file: bad.atago.yaml
          content: |
            version: "1"
            suite:
              name: bad
            scenarios:
              - name: no pty
                steps:
                  - run: {command: echo hi}
                  - assert:
                      screen: {contains: hi}
      - run:
          command: ${atago} run bad.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains: "requires a preceding pty step"
