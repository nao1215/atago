version: "1"

suite:
  name: atago self-hosting / parallel

scenarios:
  - name: parallel run passes and stays deterministic
    steps:
      - fixture:
          file: many.atago.yaml
          content: |
            version: "1"
            suite:
              name: many
            scenarios:
              - name: a
                steps: [{run: {shell: true, command: echo a}}, {assert: {stdout: {contains: a}}}]
              - name: b
                steps: [{run: {shell: true, command: echo b}}, {assert: {stdout: {contains: b}}}]
              - name: c
                steps: [{run: {shell: true, command: echo c}}, {assert: {stdout: {contains: c}}}]
      - run:
          command: ${atago} run --parallel 3 many.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "3 passed"

  - name: fail-fast stops after the first failure
    steps:
      - fixture:
          file: ff.atago.yaml
          content: |
            version: "1"
            suite:
              name: ff
            scenarios:
              - name: boom
                steps: [{run: {shell: true, command: "exit 1"}}, {assert: {exit_code: 0}}]
              - name: never
                steps: [{run: {shell: true, command: echo hi}}, {assert: {exit_code: 0}}]
      # --parallel 1 pins serial scheduling: with the CPU-count default both
      # scenarios would start before the first failure could skip anything.
      - run:
          command: ${atago} run --parallel 1 --fail-fast ff.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains: "1 skipped"

  - name: scenario-scoped services stay isolated under parallel workers
    # Each inner scenario owns a service and asserts ITS OWN service's captured
    # value: a process-group mixup under concurrency (killing a sibling's
    # service, swapping a store) flips an inner verdict and fails the outer
    # exit-0 assert. The services are POSIX shell one-liners.
    skip:
      os: windows
    steps:
      - fixture:
          file: par-svc.atago.yaml
          content: |
            version: "1"
            suite:
              name: par-svc
            scenarios:
              - name: one
                services:
                  - name: peer1
                    shell: true
                    command: 'echo token-1 > addr.txt; sleep 30'
                    ready: {file: addr.txt, store: tok, timeout: 5s}
                steps:
                  - run: {shell: true, command: "echo got ${tok}"}
                  - assert: {exit_code: 0, stdout: {contains: got token-1}}
              - name: two
                services:
                  - name: peer2
                    shell: true
                    command: 'echo token-2 > addr.txt; sleep 30'
                    ready: {file: addr.txt, store: tok, timeout: 5s}
                steps:
                  - run: {shell: true, command: "echo got ${tok}"}
                  - assert: {exit_code: 0, stdout: {contains: got token-2}}
              - name: three
                services:
                  - name: peer3
                    shell: true
                    command: 'echo token-3 > addr.txt; sleep 30'
                    ready: {file: addr.txt, store: tok, timeout: 5s}
                steps:
                  - run: {shell: true, command: "echo got ${tok}"}
                  - assert: {exit_code: 0, stdout: {contains: got token-3}}
      - run:
          command: ${atago} run --parallel 3 par-svc.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "3 passed"
