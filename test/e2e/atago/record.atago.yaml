version: "1"

suite:
  name: atago self-hosting / record (spec skeleton from an observed run)

# Exercises #30: the record → run round-trip is the core acceptance test —
# a spec generated from an observed command must pass when run. The echo
# scenarios run on every OS (this spec is in the Windows E2E allowlist);
# the shell-redirect scenario is POSIX.
scenarios:
  - name: record then run round-trips green
    steps:
      # `${atago} version` is the one command guaranteed present on every OS.
      - run:
          command: ${atago} record --out recorded.atago.yaml -- ${atago} version
      - assert:
          exit_code: 0
          stderr:
            contains: "wrote recorded.atago.yaml"
      - assert:
          file:
            path: recorded.atago.yaml
            contains: "contains: atago"
      - run:
          command: ${atago} run recorded.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: refusing to overwrite without --force
    steps:
      - fixture:
          file: existing.atago.yaml
          content: "precious"
      - run:
          command: ${atago} record --out existing.atago.yaml -- ${atago} version
      - assert:
          exit_code: 3
          stderr:
            contains: "use --force to overwrite"
      - assert:
          file:
            path: existing.atago.yaml
            contains: precious
      - run:
          command: ${atago} record --force --out existing.atago.yaml -- ${atago} version
      - assert:
          exit_code: 0
          file:
            path: existing.atago.yaml
            contains: "exit_code: 0"

  - name: record --pty refuses an existing --out before driving the session
    steps:
      # The --out existence check fires BEFORE any pty work, so this exits
      # immediately with exit 3 — no interactive session is driven (and no tty
      # is needed), proving a user is never made to hand-drive a whole session
      # only to be told the file already exists afterwards.
      - fixture:
          file: taken.atago.yaml
          content: "precious"
      - run:
          command: ${atago} record --pty --out taken.atago.yaml -- echo hi
      - assert:
          exit_code: 3
          stderr:
            contains: "use --force to overwrite"
      - assert:
          file:
            path: taken.atago.yaml
            contains: precious

  - name: created files become exists asserts (shell mode)
    skip:
      os: windows
    steps:
      - run:
          shell: true
          command: "${atago} record --shell --out gen.atago.yaml -- 'echo made > out.txt; echo done'"
      - assert:
          exit_code: 0
          file:
            path: gen.atago.yaml
            contains:
              - "path: out.txt"
              - "exists: true"
      - assert:
          file:
            path: gen.atago.yaml
            contains: "shell: true"
      - run:
          command: ${atago} run gen.atago.yaml
      - assert:
          exit_code: 0

  - name: snapshot mode writes a golden the run then matches
    skip:
      os: windows
    steps:
      - run:
          command: ${atago} record --snapshot --out snapdemo.atago.yaml -- echo stable output
      - assert:
          exit_code: 0
          file:
            path: snapdemo.atago.yaml
            contains: "snapshot: snapshots/snapdemo.stdout.txt"
      - assert:
          file:
            path: snapshots/snapdemo.stdout.txt
            contains: stable output
      - run:
          command: ${atago} run snapdemo.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: no command is a usage error
    steps:
      - run:
          command: ${atago} record
      - assert:
          exit_code: 3
          stderr:
            contains: "no command given"

  - name: argv boundaries survive spaced arguments
    skip:
      os: windows
    steps:
      # An argument containing spaces must reach the recorded command as ONE
      # argv element, and the generated spec must reproduce it (quoted) so
      # the round-trip run still passes.
      - run:
          command: ${atago} record --out spaced.atago.yaml -- printf %s 'hello world'
      - assert:
          exit_code: 0
          file:
            path: spaced.atago.yaml
            contains: "contains: hello world"
      - run:
          command: ${atago} run spaced.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: a shell metacharacter argument stays one token
    skip:
      os: windows
    steps:
      # `foo|bar` is one argv element to the tool, but go-shellwords would
      # split it on the pipe if it were re-emitted unquoted — record must
      # quote it so the round-trip run reproduces the same single argument.
      - run:
          command: ${atago} record --out meta.atago.yaml -- printf %s "foo|bar"
      - assert:
          exit_code: 0
          file:
            path: meta.atago.yaml
            contains: "contains: foo|bar"
      - run:
          command: ${atago} run meta.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: record --pty records a live session and the generated spec replays green
    skip:
      os: windows
    steps:
      # The recorder recorded by atago (#69): an OUTER pty step drives
      # `atago record --pty` by hand — typing "world" at the prompt — and the
      # inner recorder reconstructs an expect/send spec from the transcript.
      - pty:
          shell: true
          command: '${atago} record --pty --out generated.atago.yaml -- sh -c ''printf PROMPT; read n; echo hi-$n'''
          timeout: 20s
          session:
            - expect: "PROMPT"
            - send: "world\n"
            - expect: "hi-world"
      - assert:
          exit_code: 0
      # The generated spec exists and captured the session as a pty step.
      - assert:
          file:
            path: generated.atago.yaml
            contains:
              - "- pty:"
              - "- send:"
      # The round-trip: replaying the generated spec passes.
      - run:
          command: ${atago} run generated.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: record --pty of a no-input command yields a session-less spec that replays green
    skip:
      os: windows
    steps:
      # `echo` reads nothing, so the recorder captures output only and the
      # generated spec's pty step has NO interactive session (no expect/send).
      # An OUTER pty step still hand-drives the recorder because record --pty
      # needs a real tty.
      - pty:
          command: '${atago} record --pty --out echo.atago.yaml -- echo done'
          timeout: 20s
          session:
            # The recorder's closing summary reports the send count; anchoring
            # on it proves the session ended with zero sends.
            - expect: "0 send"
      - assert:
          exit_code: 0
      - assert:
          file:
            path: echo.atago.yaml
            contains:
              - "- pty:"
              - "command: echo done"
      # No session was recorded — the pty step carries no send/session key.
      - assert:
          file:
            path: echo.atago.yaml
            not_contains:
              - "- send:"
              - "session:"
      # The round-trip: replaying the generated spec passes.
      - run:
          command: ${atago} run echo.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: a prompt with regex metacharacters is escaped in the generated expect
    skip:
      os: windows
    steps:
      # The prompt "Continue? (y/n): " contains regex metacharacters (? and
      # parens). The recorder must emit a LITERAL matcher, so the generated
      # expect escapes them (\? \( \)); an unescaped expect would treat them as
      # regex operators and could match the wrong output.
      - pty:
          command: '${atago} record --pty --out meta.atago.yaml -- sh -c ''printf "Continue? (y/n): "; read a; echo got-$a'''
          timeout: 20s
          session:
            - expect: "Continue\\? \\(y/n\\):"
            - send: "y\n"
            - expect: "got-y"
      - assert:
          exit_code: 0
      # The generated expect is regex-escaped (single-quoted here so the
      # backslashes are the literal bytes the recorder wrote).
      - assert:
          file:
            path: meta.atago.yaml
            contains:
              - 'expect: "Continue\\? \\(y/n\\):"'
              - "- send:"
      # The round-trip: replaying the escaped matcher passes.
      - run:
          command: ${atago} run meta.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: recorded text containing dollar-brace round-trips as literal text
    skip:
      os: windows
    steps:
      # The tool's argv and output contain a literal ${HOME}. The engine
      # expands ${name} in command/assert values at replay, so record emits
      # the $${...} escape — without it the generated no-shell command would
      # error on the unresolved reference instead of replaying. This outer
      # spec needs the same discipline: $${HOME} below reaches the recorder as
      # the literal ${HOME}, and the contains value is $$$-escaped so it still
      # reads $${HOME} after its own expansion.
      - run:
          command: ${atago} record --out dollar.atago.yaml -- printf %s 'literal $${HOME} here'
      - assert:
          exit_code: 0
          file:
            path: dollar.atago.yaml
            contains: "$$${HOME}"
      - run:
          command: ${atago} run dollar.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: a recorded secret placeholder replays green with the env set and is guarded when unset
    skip:
      os: windows
    steps:
      # #69 records echo-off (secret) input as a live ${env:ATAGO_SECRET_n}
      # placeholder — the one send that MUST stay a live reference. #78 adds the
      # unresolved-variable guard for pty sessions, so this placeholder path has
      # two contracts: with the variable SET it replays green, and with it UNSET
      # the run fails loudly instead of typing the literal placeholder into the
      # password prompt. An OUTER pty step hand-drives the recorder against a
      # prompt that turns terminal echo off; the read value is never echoed, so
      # the secret never lands in the generated spec.
      - pty:
          shell: true
          command: '${atago} record --pty --out sec.atago.yaml -- sh -c ''stty -echo; printf "Password: "; read pw; stty echo; printf "\naccepted\n"'''
          timeout: 20s
          session:
            - expect: "Password:"
            - send: "hunter2\n"
            - expect: "accepted"
      - assert:
          exit_code: 0
      # The generated send is a live env placeholder, and the typed secret is not
      # recorded anywhere in the spec.
      - assert:
          file:
            path: sec.atago.yaml
            contains: "${env:ATAGO_SECRET_1}"
      - assert:
          file:
            path: sec.atago.yaml
            not_contains: "hunter2"
      # With the secret variable set, the placeholder expands and the spec
      # replays green.
      - run:
          shell: true
          env:
            ATAGO_SECRET_1: hunter2
          command: ${atago} run sec.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"
      # With it unset, the #78 guard fires (exit 4) instead of typing the literal
      # ${env:ATAGO_SECRET_1} into the prompt.
      - run:
          command: ${atago} run sec.atago.yaml
      - assert:
          exit_code: 4
          stdout:
            contains: "ATAGO_SECRET_1 is not set"

  - name: record --pty of a never-exiting program times out instead of hanging
    skip:
      os: windows
    steps:
      # #194: `record --pty` used to wait forever for the child to exit, so a
      # server-like or wedged interactive program (here `tail -f /dev/null`,
      # which ignores stdin and never exits) would hang with no way out but
      # Ctrl-C. --timeout now bounds that wait. A plain run step drives the
      # recorder from a non-terminal stdin — record --pty tolerates that (raw
      # mode is best-effort) — so the bound is exercisable in CI without a
      # pseudo-terminal on the driving side. taskkill/`tail` are POSIX here;
      # the Windows ConPTY timeout path is covered by the record unit test.
      - run:
          command: ${atago} record --pty --timeout 2s --out wedged.atago.yaml -- tail -f /dev/null
      # Non-zero exit (execution error) and a clear, actionable message — never a
      # silent, unbounded block.
      - assert:
          exit_code: 4
          stderr:
            contains: "did not exit within 2s"
      - assert:
          stderr:
            contains: "use --timeout to adjust"
      # The transcript captured before the deadline is still written, so the
      # partial recording is not thrown away.
      - assert:
          file:
            path: wedged.atago.yaml
            contains: "- pty:"
