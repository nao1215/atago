version: "1"

suite:
  name: atago self-hosting / ssh runner

# Exercises the SSH runner's wiring through the real atago binary.
# Live remote execution is covered hermetically by a Go test with an in-process
# SSH server (internal/engine/ssh_test.go); these scenarios pin the binary's
# config validation and dispatch errors, which need no server.
scenarios:
  - name: an ssh runner without host/user fails validation (exit 2)
    steps:
      - fixture:
          file: badssh.atago.yaml
          content: |
            version: "1"
            suite:
              name: ssh
            runners:
              box:
                type: ssh
            scenarios:
              - name: remote run
                steps:
                  - run:
                      runner: box
                      command: uptime
      - run:
          command: ${atago} run badssh.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains: requires a host

  - name: a run step naming an undeclared runner fails validation (exit 2)
    steps:
      - fixture:
          file: norunner.atago.yaml
          content: |
            version: "1"
            suite:
              name: ssh
            scenarios:
              - name: remote run
                steps:
                  - run:
                      runner: missing
                      command: uptime
      - run:
          command: ${atago} run norunner.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains: is not declared

  - name: a local-only run field on an ssh runner fails validation (exit 2)
    steps:
      # env/clear_env/pass_env/sandbox_home/stdin/stdout_to/stderr_to/cwd shape
      # LOCAL execution only; the ssh runner forwards just the command, so the
      # loader rejects them instead of silently dropping them.
      - fixture:
          file: sshfield.atago.yaml
          content: |
            version: "1"
            suite:
              name: ssh
            runners:
              box:
                type: ssh
                host: deploy.example.com
                user: deploy
            scenarios:
              - name: remote run
                steps:
                  - run:
                      runner: box
                      command: uptime
                      cwd: /var/tmp
      - run:
          command: ${atago} run sshfield.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains:
              - "run.cwd has no effect on an ssh runner"
              - steps[0].run
