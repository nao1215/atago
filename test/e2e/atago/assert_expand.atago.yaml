version: "1"

suite:
  name: atago self-hosting / variable expansion in assertion matcher values

# Regression for the mimixbox migration: ShellSpec specs embed paths in expected
# output, e.g. `The output should equal "${MIMIXBOX_IT_ROOT}/cat.txt"`. atago
# now expands ${name}/${workdir} in stream and file matcher values too
#, not just in commands and file.path.
scenarios:
  - name: stdout.equals expands ${workdir}
    steps:
      - run:
          shell: true
          command: 'printf "%s\n" "${workdir}/out.txt"'
      - assert:
          stdout:
            equals: "${workdir}/out.txt"

  - name: stdout.contains and not_contains expand a stored variable
    steps:
      - run:
          shell: true
          command: 'printf "%s" hello-123'
      - store:
          name: token
          from:
            stdout:
              matches: "(hello-[0-9]+)"
      - run:
          shell: true
          command: 'printf "%s\n" "hello-123 world"'
      - assert:
          stdout:
            contains: "${token}"
      - assert:
          stdout:
            not_contains: "${token}-absent"

  - name: file.contains expands ${workdir}
    steps:
      - run:
          shell: true
          command: 'printf "%s\n" "${workdir}/marker" > note.txt'
      - assert:
          file:
            path: note.txt
            contains: "${workdir}/marker"

  # The newer target families must expand like the stream/file matchers above:
  # dir.path, screen matchers, and changes entries all went through the same
  # walker gap once, so each family gets its own regression pin.
  - name: dir.path expands a stored variable
    steps:
      - run:
          shell: true
          command: 'mkdir -p site && touch site/a.html && echo site'
      - store:
          name: outdir
          from:
            stdout:
              matches: "(site)"
      - assert:
          dir:
            path: "${outdir}"
            contains: [a.html]

  - name: changes entries expand a stored variable
    steps:
      - run:
          shell: true
          command: 'echo out'
      - store:
          name: base
          from:
            stdout:
              matches: "(out)"
      - run:
          shell: true
          command: 'echo w > ${base}2.txt'
      - assert:
          changes:
            created: ["${base}2.txt"]
            modified: []
            deleted: []

  - name: screen matcher expands a stored variable
    skip:
      os: windows
    steps:
      - run:
          shell: true
          command: 'echo needle'
      - store:
          name: pat
          from:
            stdout:
              matches: "(needle)"
      - pty:
          shell: true
          command: 'echo needle'
      - assert:
          screen:
            contains: ["${pat}"]
