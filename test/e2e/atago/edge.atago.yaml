version: "1"

suite:
  name: atago self-hosting / edge cases

scenarios:
  # Regression: a JSON assertion against empty stdout must report that the
  # stream was empty (not a misleading "no match"). Found by dogfooding
  # `gup list --json`, which prints nothing when no tools are installed.
  - name: JSON assertion on empty stdout reports an empty stream
    steps:
      - fixture:
          file: empty.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: json on empty
                steps:
                  - run:
                      shell: true
                      command: "exit 0"
                  - assert:
                      stdout:
                        json:
                          path: "$.x"
                          equals: 1
      - run:
          command: ${atago} run empty.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains: "was empty"

  # An unsupported matcher must be a clean parse error (exit 2), never a crash.
  - name: an unsupported matcher is a parse error
    steps:
      - fixture:
          file: bad.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: csv matcher
                steps:
                  - run:
                      shell: true
                      command: echo hi
                  - assert:
                      stdout:
                        csv:
                          column: name
      - run:
          command: ${atago} run bad.atago.yaml
      - assert:
          exit_code: 2

  - name: a mixed valid+invalid run reads FAILED and counts the dropped spec
    steps:
      - fixture:
          file: good.atago.yaml
          content: |
            version: "1"
            suite:
              name: good
            scenarios:
              - name: echo works
                steps:
                  - run: {shell: true, command: echo hi}
                  - assert: {exit_code: 0}
      - fixture:
          file: broken.atago.yaml
          content: |
            version: "1"
            suite:
              name: broken
            scenarios:
              - name: uses an unknown field
                steps:
                  - nonsense_field: {command: echo nope}
      # The valid spec runs, the invalid one is dropped: the headline must read
      # FAILED (not a misleading PASSED), surface the dropped spec, and exit 2.
      - run:
          command: ${atago} run good.atago.yaml broken.atago.yaml
      - assert:
          exit_code: 2
          stdout:
            contains: "1 spec failed to load"
      - assert:
          stdout:
            not_contains: "PASSED"
