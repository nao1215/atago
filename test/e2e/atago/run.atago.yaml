version: "1"

suite:
  name: atago self-hosting / run

scenarios:
  - name: a passing spec exits zero and reports PASS
    steps:
      - fixture:
          file: passing.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: exit 0 succeeds
                steps:
                  - run:
                      shell: true
                      command: "exit 0"
                  - assert:
                      exit_code: 0
                      stderr:
                        empty: true
      - run:
          command: ${atago} run passing.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: PASS
          stderr:
            empty: true

  - name: a failing assertion exits one and reports the failure
    steps:
      - fixture:
          file: failing.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: exit 1 should pass
                steps:
                  - run:
                      shell: true
                      command: "exit 1"
                  - assert:
                      exit_code: 0
      - run:
          command: ${atago} run failing.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains:
              - FAILED
              - expected exit code 0
              # The failure header names the spec file, so a multi-file run
              # points at the YAML to edit without grepping for the scenario.
              - (failing.atago.yaml)

  # The inner command needs "emit a stream, then exit non-zero" in one shell
  # line, and the separator differs per shell (';' in sh, '&' in cmd.exe), so
  # the scenario comes in an OS-gated pair.
  - name: an exit_code failure surfaces the command's stderr
    skip:
      os: windows
    steps:
      - fixture:
          file: stderr_cause.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: converter fails loudly
                steps:
                  - run:
                      shell: true
                      command: "echo conversion aborted: bad header 1>&2; exit 3"
                  - assert:
                      exit_code: 0
      - run:
          command: ${atago} run stderr_cause.atago.yaml
      - assert:
          exit_code: 1
          # The WHY of a non-zero exit sits on stderr; the failure block must
          # show it instead of hiding it behind --verbose.
          stdout:
            contains:
              - "Stderr:"
              - "conversion aborted: bad header"

  - name: an exit_code failure surfaces the command's stderr (windows)
    only:
      os: windows
    steps:
      - fixture:
          file: stderr_cause.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: converter fails loudly
                steps:
                  - run:
                      shell: true
                      command: "echo conversion aborted: bad header 1>&2 & exit 3"
                  - assert:
                      exit_code: 0
      - run:
          command: ${atago} run stderr_cause.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains:
              - "Stderr:"
              - "conversion aborted: bad header"

  - name: an exit_code failure falls back to stdout when stderr is silent
    skip:
      os: windows
    steps:
      - fixture:
          file: stdout_cause.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: converter fails on stdout
                steps:
                  - run:
                      shell: true
                      command: "echo wrote 0 of 3 files; exit 3"
                  - assert:
                      exit_code: 0
      - run:
          command: ${atago} run stdout_cause.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains:
              - "Stdout:"
              - "wrote 0 of 3 files"

  - name: an exit_code failure falls back to stdout when stderr is silent (windows)
    only:
      os: windows
    steps:
      - fixture:
          file: stdout_cause.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: converter fails on stdout
                steps:
                  - run:
                      shell: true
                      command: "echo wrote 0 of 3 files & exit 3"
                  - assert:
                      exit_code: 0
      - run:
          command: ${atago} run stdout_cause.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains:
              - "Stdout:"
              - "wrote 0 of 3 files"

  - name: a parse error exits with code two
    steps:
      - fixture:
          file: broken.atago.yaml
          content: |
            version: "1"
            suite:
              : not valid yaml
      - run:
          command: ${atago} run broken.atago.yaml
      - assert:
          exit_code: 2

  - name: JSON report is valid JSON with a passed status
    steps:
      - fixture:
          file: ok.atago.yaml
          content: |
            version: "1"
            suite:
              name: sample
            scenarios:
              - name: echo
                steps:
                  - run:
                      shell: true
                      command: echo hello
                  - assert:
                      stdout:
                        contains: hello
      - run:
          command: ${atago} run --report json ok.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            json:
              path: "$.schema_version"
              equals: "1"
      - assert:
          stdout:
            json:
              path: "$.suites[0].status"
              equals: passed
      - assert:
          stdout:
            json:
              path: "$.suites[0].scenarios"
              length: 1
