version: "1"

suite:
  name: atago self-hosting / changes (workdir delta assertions)

# Exercises #70: the `changes:` assert pins the EXACT set of files the
# immediately preceding run/pty step created, modified, and deleted in the
# scenario workdir — the "this command touches only these files" contract that
# per-path file: asserts cannot state. Each set field is exhaustive in both
# directions, so `modified: []` asserts "modified nothing" and an omitted field
# is unconstrained. Fixture writes are inputs (they land before the pre-scan),
# not changes.
#
# The multi-file setup uses a POSIX shell, so the first scenario skips on
# Windows; a portable stdout_to-only scenario runs everywhere to prove the
# created-counting rule on Windows too.
scenarios:
  - name: a generator touches exactly the files it should (POSIX)
    skip:
      os: windows
    steps:
      - fixture:
          file: config.yaml
          content: "theme: light\n"
      - fixture:
          file: stale.html
          content: "old\n"
      - run:
          shell: true
          command: >-
            printf 'theme: dark\n' > config.yaml &&
            rm stale.html &&
            mkdir -p site/assets &&
            printf '<html></html>' > site/index.html &&
            printf 'body{}' > site/assets/app.css
      - assert:
          exit_code: 0
          changes:
            created:
              - site/index.html
              - site/assets/*.css
            modified:
              - config.yaml
            deleted:
              - stale.html

  - name: an unexpected creation breaks the exact contract (POSIX)
    skip:
      os: windows
    steps:
      - fixture:
          file: check.atago.yaml
          content: |
            version: "1"
            suite:
              name: unexpected
            scenarios:
              - name: extra file
                steps:
                  - run:
                      shell: true
                      command: 'echo a > a.txt && echo b > b.txt'
                  - assert:
                      changes:
                        created:
                          - a.txt
      - run:
          command: ${atago} run check.atago.yaml
      # b.txt is an unexpected creation, so the inner run fails (exit 1).
      - assert:
          exit_code: 1
          stdout:
            contains: "unexpected created file"

  - name: stdout_to counts as created, and modified nothing holds (portable)
    steps:
      - fixture:
          file: input.txt
          content: seed
      - run:
          shell: true
          command: echo produced
          stdout_to: result.txt
      - assert:
          exit_code: 0
          changes:
            created:
              - result.txt
            modified: []
            deleted: []

  - name: the delta over a retried step is cumulative across all attempts (POSIX)
    skip:
      os: windows
    steps:
      # Pinned semantic (#251): with retry, atago re-scans the workdir baseline
      # before EVERY attempt, so the changes delta reflects only the final,
      # converged attempt — the state the until gate accepted — not the
      # cumulative footprint of every attempt. This command fails on attempt 1
      # (c does not exist yet) and passes on attempt 2. On attempt 2, a and b
      # already exist from attempt 1 (so they are baseline, not changes), and the
      # only new file the winning attempt creates is c.
      - run:
          shell: true
          command: 'touch a; [ -f b ] && touch c; touch b; [ -f c ]'
          retry:
            times: 3
            interval: 10ms
            until:
              exit_code: 0
      - assert:
          exit_code: 0
          changes:
            created:
              - c
            modified: []
            deleted: []

  - name: deleting and recreating a byte-identical file appears in no list (POSIX)
    skip:
      os: windows
    steps:
      # The delta is content-hash based, not event based: a file that is
      # removed and rewritten with its ORIGINAL bytes is indistinguishable from
      # untouched, so it appears in none of created/modified/deleted.
      - fixture:
          file: f.txt
          content: "hello"
      - run:
          shell: true
          command: 'rm f.txt && printf hello > f.txt'
      - assert:
          exit_code: 0
          changes:
            created: []
            modified: []
            deleted: []

  - name: deleting and recreating with different content is modified only (POSIX)
    skip:
      os: windows
    steps:
      # Same delete+recreate, but the new bytes differ — so the content hash
      # changes and the file reports as modified (not deleted+created).
      - fixture:
          file: f.txt
          content: "hello"
      - run:
          shell: true
          command: 'rm f.txt && printf world > f.txt'
      - assert:
          exit_code: 0
          changes:
            created: []
            modified:
              - f.txt
            deleted: []

  - name: stdout_to overwrites a fixture (modified) while stderr_to creates an empty file (POSIX)
    skip:
      os: windows
    steps:
      # stdout_to onto a pre-existing fixture rewrites it with new bytes, so it
      # is modified; stderr_to captures an empty stderr, which still creates a
      # brand-new 0-byte file that the delta counts as created.
      - fixture:
          file: existing.txt
          content: "old"
      - run:
          shell: true
          command: printf newcontent
          stdout_to: existing.txt
          stderr_to: err.txt
      - assert:
          exit_code: 0
          changes:
            created:
              - err.txt
            modified:
              - existing.txt
            deleted: []

  - name: a pty step feeds the delta scan just like a run step (POSIX)
    skip:
      os: windows
    steps:
      # The pre/post workdir scan wraps a pty step too: the file the
      # interactive command touched shows up in the very next changes assert.
      - pty:
          shell: true
          command: 'sh -c "touch from-pty; echo done"'
          timeout: 10s
          session:
            - expect: done
      - assert:
          changes:
            created:
              - from-pty

  - name: a doublestar glob pins an arbitrary-depth generated tree exactly (POSIX)
    skip:
      os: windows
    steps:
      # A generator that writes a 3-level tree of unknown depth: a single
      # `out/**` entry (#76) pins the whole subtree at once — impossible with
      # single-level `*`, which never crosses `/` — while modified/deleted stay
      # empty to keep the exhaustive-both-ways contract intact.
      - run:
          shell: true
          command: >-
            mkdir -p out/a/b &&
            printf '1' > out/top.txt &&
            printf '2' > out/a/mid.txt &&
            printf '3' > out/a/b/leaf.txt
      - assert:
          exit_code: 0
          changes:
            created:
              - "out/**"
            modified: []
            deleted: []

  - name: a stray file outside the doublestar prefix breaks the exact contract (POSIX)
    skip:
      os: windows
    steps:
      - fixture:
          file: check.atago.yaml
          content: |
            version: "1"
            suite:
              name: stray-outside-doublestar
            scenarios:
              - name: extra file beside the tree
                steps:
                  - run:
                      shell: true
                      command: 'mkdir -p out/a && printf x > out/a/leaf.txt && printf y > stray.txt'
                  - assert:
                      changes:
                        created:
                          - "out/**"
      - run:
          command: ${atago} run check.atago.yaml
      # stray.txt is created outside out/, so `out/**` cannot cover it and the
      # exhaustive contract fails (exit 1).
      - assert:
          exit_code: 1
          stdout:
            contains: "unexpected created file"

  - name: a doublestar glob matches a nested redirect target (portable)
    steps:
      # stdout_to writes into a directory atago creates; observed paths are
      # normalized to forward slashes, so `out/**` matches on Windows too — the
      # redirect and the glob need no POSIX shell.
      - run:
          shell: true
          command: echo produced
          stdout_to: out/deep/result.txt
      - assert:
          exit_code: 0
          changes:
            created:
              - "out/**"
            modified: []
            deleted: []

  - name: a doublestar prefix covers both redirect streams (portable)
    steps:
      # stdout_to and stderr_to both land under logs/; a single logs/** entry
      # covers the pair (an empty stderr still creates a 0-byte file).
      - run:
          shell: true
          command: echo out
          stdout_to: logs/out.txt
          stderr_to: logs/err.txt
      - assert:
          exit_code: 0
          changes:
            created:
              - "logs/**"
            modified: []
            deleted: []
