version: "1"

suite:
  name: atago self-hosting / retry until

# Exercises declarative retry/until polling on a run step: the command
# is re-run until the `until` assertion passes or the attempt budget is spent.
# This is atago's answer to runn's retry for async behavior, with no hand-rolled
# shell `timeout` loops.
scenarios:
  - name: retry polls until the condition becomes true
    steps:
      - fixture:
          file: ready.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: becomes ready on a later attempt
                steps:
                  - run:
                      shell: true
                      command: "if [ -f marker ]; then echo ready; else touch marker; echo waiting; fi"
                      retry:
                        times: 5
                        interval: 10ms
                        until:
                          stdout:
                            contains: ready
                  - assert:
                      stdout:
                        contains: ready
      - run:
          command: ${atago} run ready.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: passed

  - name: retry fails the inner spec when until never holds
    steps:
      - fixture:
          file: never.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: never ready
                steps:
                  - run:
                      command: echo waiting
                      retry:
                        times: 3
                        interval: 1ms
                        until:
                          stdout:
                            contains: ready
      - run:
          command: ${atago} run never.atago.yaml
      - assert:
          exit_code: 1

  - name: until with a changes target is a load-time error
    steps:
      # A retry polls the raw exec result of each attempt, where the workdir
      # delta is never computed — so `until: {changes: ...}` could never pass.
      # The loader rejects it up front (exit 2) instead of exhausting the budget.
      - fixture:
          file: badchanges.atago.yaml
          content: |
            version: "1"
            suite:
              name: bad
            scenarios:
              - name: unsatisfiable until
                steps:
                  - run:
                      command: echo hi
                      retry:
                        times: 3
                        until:
                          changes:
                            created: [out.txt]
      - run:
          command: ${atago} run badchanges.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains:
              - "retry.until.changes cannot be satisfied"
              - steps[0].run
