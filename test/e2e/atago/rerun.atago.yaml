version: "1"

suite:
  name: atago self-hosting / rerun-failed

scenarios:
  - name: a failing run is recorded and rerun-failed selects only it
    steps:
      - fixture:
          file: inner.atago.yaml
          content: |
            version: "1"
            suite:
              name: inner
            scenarios:
              - name: always-green
                steps:
                  - run: {shell: true, command: "exit 0"}
                  - assert: {exit_code: 0}
              - name: always-red
                steps:
                  - run: {shell: true, command: "exit 1"}
                  - assert: {exit_code: 0}
      # First run: one scenario fails, so the run exits 1 and records the failure.
      - run:
          command: ${atago} run inner.atago.yaml
      - assert:
          exit_code: 1
      # The state file is an explicit, documented JSON contract.
      - assert:
          file:
            path: .atago/last-failed.json
            exists: true
      - assert:
          file:
            path: .atago/last-failed.json
            json:
              path: $.failed[0].scenario
              equals: always-red
      # Rerun only the previously-failed scenario. It still fails, and the report
      # must mention it.
      - run:
          command: ${atago} run --rerun-failed inner.atago.yaml
      - assert:
          exit_code: 1
          stdout:
            contains: always-red

  - name: rerun-failed with nothing recorded is a no-op success
    steps:
      - fixture:
          file: green.atago.yaml
          content: |
            version: "1"
            suite:
              name: green
            scenarios:
              - name: passes
                steps:
                  - run: {shell: true, command: "exit 0"}
                  - assert: {exit_code: 0}
      # A clean workdir has no recorded failures, so --rerun-failed exits 0 and
      # reports that there is nothing to rerun.
      - run:
          command: ${atago} run --rerun-failed green.atago.yaml
      - assert:
          exit_code: 0
          stderr:
            contains: nothing to rerun

  - name: rerun-failed with a filter preserves the still-failing scenarios it did not run
    steps:
      - fixture:
          file: two.atago.yaml
          content: |
            version: "1"
            suite:
              name: two
            scenarios:
              - name: red-a
                steps:
                  - run: {shell: true, command: "exit 1"}
                  - assert: {exit_code: 0}
              - name: red-b
                steps:
                  - run: {shell: true, command: "exit 1"}
                  - assert: {exit_code: 0}
      # Both scenarios fail, so the ledger records both.
      - run:
          command: ${atago} run two.atago.yaml
      - assert:
          exit_code: 1
      # Rerun only red-a via --filter. red-b is excluded from this run but is still
      # broken, so it must stay in the ledger rather than being silently dropped
      # (which would greenlight a later plain --rerun-failed).
      - run:
          command: ${atago} run --rerun-failed --filter red-a two.atago.yaml
      - assert:
          exit_code: 1
      - assert:
          file:
            path: .atago/last-failed.json
            contains: [red-a, red-b]
