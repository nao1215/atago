version: "1"

suite:
  name: atago self-hosting / top-level defaults

# Exercises the top-level `defaults:` block: shared authoring sugar
# merged into the concrete scenario/step/service model at load time. These specs
# run the built ${atago} against inner specs and assert the merged behavior, so
# the feature is verified end-to-end (not just in loader unit tests). The scope
# is fixed at defaults.run / defaults.scenario.env / defaults.service — no
# macros, includes, or expression language.
scenarios:
  - name: defaults.run.shell applies to every run step without repeating it
    steps:
      - fixture:
          file: shell.atago.yaml
          content: |
            version: "1"
            suite:
              name: shelled
            defaults:
              run:
                shell: true
            scenarios:
              - name: uses a shell builtin and env expansion
                env:
                  WHO: world
                steps:
                  - run:
                      command: echo "hello $WHO"
                  - assert:
                      stdout:
                        contains: hello world
      - run:
          command: ${atago} run shell.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: defaults.scenario.env is merged and an explicit scenario env wins
    steps:
      - fixture:
          file: env.atago.yaml
          content: |
            version: "1"
            suite:
              name: enved
            defaults:
              run:
                shell: true
              scenario:
                env:
                  FROM_DEFAULT: base
                  SHARED: default
            scenarios:
              - name: sees the default and overrides one key
                env:
                  SHARED: own
                steps:
                  - run:
                      command: echo "$FROM_DEFAULT-$SHARED"
                  - assert:
                      stdout:
                        contains: base-own
      - run:
          command: ${atago} run env.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: defaults.run.sandbox_home governs a run step and a pty step alike (POSIX)
    skip:
      os: windows
    steps:
      # #77: the environment-shaping subset of defaults.run (here sandbox_home)
      # must layer onto pty steps too — they share a run step's environment
      # surface. A single defaults.run.sandbox_home: true isolates the home for
      # BOTH steps: the run step writes config under the sandboxed XDG home and
      # the pty step reads it back from the SAME .atago-home, proving the default
      # reached the interactive step instead of leaving it on the host home.
      - fixture:
          file: sandbox.atago.yaml
          content: |
            version: "1"
            suite:
              name: shared-sandbox
            defaults:
              run:
                shell: true
                sandbox_home: true
            scenarios:
              - name: a run step writes and a pty step reads under one sandbox home
                steps:
                  - run:
                      command: 'mkdir -p "$XDG_CONFIG_HOME/mytool" && printf editor=vim > "$XDG_CONFIG_HOME/mytool/config"'
                  - assert:
                      exit_code: 0
                  - pty:
                      shell: true
                      command: 'cat "$XDG_CONFIG_HOME/mytool/config"'
                      session:
                        - expect: 'editor=vim'
                  - assert:
                      exit_code: 0
                  # Both steps shared the one deterministic isolated home.
                  - assert:
                      file:
                        path: .atago-home/.config/mytool/config
                        contains: editor=vim
      - run:
          command: ${atago} run sandbox.atago.yaml
      - assert:
          exit_code: 0
          stdout:
            contains: "1 passed"

  - name: an unsupported defaults field is a load-time error (exit 2)
    steps:
      - fixture:
          file: bad.atago.yaml
          content: |
            version: "1"
            suite:
              name: bad
            defaults:
              run:
                command: echo nope
            scenarios:
              - name: never runs
                steps:
                  - run:
                      command: echo hi
      - run:
          command: ${atago} run bad.atago.yaml
      - assert:
          exit_code: 2
          stderr:
            contains: defaults.run.command is not supported
