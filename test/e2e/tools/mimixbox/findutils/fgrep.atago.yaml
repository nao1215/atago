# Migrated from mimixbox's ShellSpec test/it/spec/fgrep_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: fgrep" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox fgrep

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: fgrep --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: fgrep"
          stderr:
            empty: true
