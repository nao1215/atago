# Migrated from mimixbox's ShellSpec test/it/spec/egrep_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: egrep" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox egrep

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: egrep --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: egrep"
          stderr:
            empty: true
