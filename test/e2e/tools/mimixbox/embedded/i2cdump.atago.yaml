# Migrated from mimixbox's ShellSpec test/it/spec/i2cdump_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: i2cdump" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox i2cdump

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: i2cdump --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: i2cdump"
          stderr:
            empty: true
