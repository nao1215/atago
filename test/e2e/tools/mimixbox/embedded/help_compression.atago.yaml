# Migrated from mimixbox's ShellSpec test/it/spec/help_compression_spec.sh
# (Parameters block, no helper). Issues #649-#660, #698-#708: every
# compression/decompression applet routes --help through the structured
# renderer, exits 0, with line 1 'Usage: <app>', an Examples and an
# Exit status section, and at least one example line starting with the name.
# Cross-cutting spec kept in embedded (the applets span archival/textutils).
version: "1"

suite:
  name: mimixbox compression --help contract

scenarios:
  - name: xz --help exposes the documented sections
    steps:
      - run:
          command: "xz --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: xz"
      - assert:
          stdout:
            contains:
              - "Examples:"
              - "Exit status:"
              - "  xz "

  - name: unxz --help exposes the documented sections
    steps:
      - run:
          command: "unxz --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: unxz"
      - assert:
          stdout:
            contains:
              - "Examples:"
              - "Exit status:"
              - "  unxz "

  - name: xzcat --help exposes the documented sections
