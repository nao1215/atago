# Migrated from mimixbox's ShellSpec test/it/spec/i2cdetect_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: i2cdetect" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox i2cdetect

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: i2cdetect --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: i2cdetect"
          stderr:
            empty: true
