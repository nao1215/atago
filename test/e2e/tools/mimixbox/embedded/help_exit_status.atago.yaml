# Migrated from mimixbox's ShellSpec test/it/spec/help_exit_status_spec.sh
# (Parameters block, no helper). Issues #661-#697: every listed applet routes
# --help through the structured renderer, exits 0, with line 1 'Usage: <app>'
# and an 'Exit status:' section. Cross-cutting spec kept in embedded.
version: "1"

suite:
  name: mimixbox --help exit-status contract

scenarios:
  - name: ash --help exposes the documented sections
    steps:
      - run:
          command: "ash --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: ash"
      - assert:
          stdout:
            contains: "Exit status:"

  - name: bash --help exposes the documented sections
    steps:
      - run:
          command: "bash --help"
