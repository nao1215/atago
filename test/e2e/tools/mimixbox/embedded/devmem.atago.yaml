# Migrated from mimixbox's ShellSpec test/it/spec/devmem_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: devmem" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox devmem

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: devmem --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: devmem"
          stderr:
            empty: true
