# Migrated from mimixbox's ShellSpec test/it/spec/load_policy_spec.sh.
# Universal --help contract (Issue #477): exit 0, "Usage: load_policy" on stdout,
# empty stderr. Privileged/networked/destructive applets are exercised via
# --help only so the suite never reboots, formats, loads modules, or touches
# the network.
version: "1"

suite:
  name: mimixbox load_policy

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: load_policy --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: load_policy"
          stderr:
            empty: true
