# Migrated from mimixbox's ShellSpec test/it/spec/help_structured_sections_2_spec.sh
# (Parameters block, no helper; second alphabet half). Each applet routes --help
# through the structured renderer: exit 0, line 1 'Usage: <app>', an Examples
# section, an Exit status section, and an example line starting with the command
# name. echo/false/kill are shell builtins, run through env. In embedded.
version: "1"

suite:
  name: mimixbox structured --help sections (2)

scenarios:
  - name: add-shell --help exposes the documented sections
    steps:
      - run:
          command: "add-shell --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: add\\-shell"
      - assert:
          stdout:
            contains:
              - "Examples:"
              - "Exit status:"
              - "  add-shell "

