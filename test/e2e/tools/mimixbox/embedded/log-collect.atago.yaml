# Migrated from mimixbox's ShellSpec test/it/spec/log-collect_spec.sh.
# Universal --help contract (Issue #477): exit 0, "Usage: log-collect" on stdout,
# empty stderr. Privileged/networked/destructive applets are exercised via
# --help only so the suite never reboots, formats, loads modules, or touches
# the network.
version: "1"

suite:
  name: mimixbox log-collect

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: log-collect --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: log-collect"
          stderr:
            empty: true
