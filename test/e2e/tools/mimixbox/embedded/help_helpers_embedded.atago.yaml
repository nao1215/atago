# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_embedded_spec.sh
# (+ embedded/{devmem,i2cdetect,i2cdump,i2cget,i2cset,partprobe,raidautorun,
#  readahead,resume,seedrng,volname,watchdog}_test.sh).
# Per-command --help contract specs (issue #489): each command's --help exits 0
# and prints a 'Usage:' line. The ShellSpec wrapped each in 'env -- CMD --help';
# direct exec of CMD --help is the equivalent.
version: "1"

suite:
  name: mimixbox embedded --help helpers

scenarios:
  - name: devmem --help is structured
    steps:
      - run:
          command: devmem --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

  - name: i2cdetect --help is structured
    steps:
