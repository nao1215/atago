# Migrated from mimixbox's ShellSpec test/it/spec/mkfs.minix_spec.sh.
# Universal --help contract (Issue #477): exit 0, "Usage: mkfs.minix" on stdout,
# empty stderr. Privileged/networked/destructive applets are exercised via
# --help only so the suite never reboots, formats, loads modules, or touches
# the network.
version: "1"

suite:
  name: mimixbox mkfs.minix

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: mkfs.minix --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: mkfs.minix"
          stderr:
            empty: true
