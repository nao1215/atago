# Migrated from mimixbox's ShellSpec test/it/spec/help_structured_sections_spec.sh
# (Parameters block, no helper). Each applet routes --help through the structured
# renderer: exit 0, line 1 'Usage: <app>', an Examples section, an Exit status
# section, and an example line starting with the command name. true/test/printf/
# pwd are shell builtins, run through env to reach the applet. In embedded.
version: "1"

suite:
  name: mimixbox structured --help sections

scenarios:
  - name: ln --help exposes the documented sections
    steps:
      - run:
          command: "ln --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: ln"
      - assert:
          stdout:
            contains:
              - "Examples:"
              - "Exit status:"
              - "  ln "

