# Migrated from mimixbox's ShellSpec test/it/spec/watchdog_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: watchdog" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox watchdog

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: watchdog --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: watchdog"
          stderr:
            empty: true
