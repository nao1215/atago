# Migrated from mimixbox's ShellSpec test/it/spec/restorecon_spec.sh.
# Universal --help contract (Issue #477): exit 0, "Usage: restorecon" on stdout,
# empty stderr. Privileged/networked/destructive applets are exercised via
# --help only so the suite never reboots, formats, loads modules, or touches
# the network.
version: "1"

suite:
  name: mimixbox restorecon

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: restorecon --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: restorecon"
          stderr:
            empty: true
