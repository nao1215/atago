# Migrated from mimixbox's ShellSpec test/it/spec/i2cset_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: i2cset" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox i2cset

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: i2cset --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: i2cset"
          stderr:
            empty: true
