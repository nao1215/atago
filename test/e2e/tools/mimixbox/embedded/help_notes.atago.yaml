  - name: mkfs.reiser --help exposes the documented sections
    steps:
      - run:
          command: "mkfs.reiser --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: mkfs\\.reiser"
      - assert:
          stdout:
            contains: "Notes:"

  - name: nbd-client --help exposes the documented sections
    steps:
      - run:
          command: "nbd-client --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: nbd\\-client"
      - assert:
          stdout:
            contains: "Notes:"

  - name: ssl_server --help exposes the documented sections
    steps:
      - run:
          command: "ssl_server --help"
      - assert:
