  - name: vconfig --help exposes the documented sections
    steps:
      - run:
          command: "vconfig --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: vconfig"
      - assert:
          stdout:
            contains: "Notes:"

  - name: zcip --help exposes the documented sections
    steps:
      - run:
          command: "zcip --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: zcip"
      - assert:
          stdout:
            contains: "Notes:"

  - name: "[ --help exposes the documented sections"
    steps:
      - run:
          command: "env [ --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: \\["
      - assert:
          stdout:
            contains: "Notes:"

  - name: "[[ --help exposes the documented sections"
    steps:
      - run:
          command: "env [[ --help"
      - assert:
          exit_code: 0
          stdout:
            line: 1
            matches: "^Usage: \\[\\["
      - assert:
          stdout:
            contains: "Notes:"
