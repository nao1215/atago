# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_pmutils_spec.sh
# (+ pmutils/poweroff_test.sh, pmutils/reboot_test.sh). Each helper is
# `env -- '<cmd>' --help`; the --help contract prints a "Usage:" line to stdout
# and exits 0. Direct exec.
version: "1"

suite:
  name: mimixbox pmutils --help contract

scenarios:
  - name: poweroff --help is structured
    steps:
      - run:
          command: poweroff --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

  - name: reboot --help is structured
    steps:
      - run:
          command: reboot --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"
