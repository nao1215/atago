# Migrated from mimixbox's ShellSpec test/it/spec/sendmail_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: sendmail" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox sendmail

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: sendmail --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: sendmail"
          stderr:
            empty: true
