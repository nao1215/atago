# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_mailutils_spec.sh
# (+ mailutils/<cmd>_test.sh). Each helper runs `<cmd> --help` and asserts a
# structured help banner. Simple single commands -> direct exec, no shell.
version: "1"

suite:
  name: mimixbox mailutils commands expose a dedicated --help helper

scenarios:
  - name: makemime --help is structured
    steps:
      - run: { command: "makemime --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }

  - name: popmaildir --help is structured
    steps:
      - run: { command: "popmaildir --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }

  - name: reformime --help is structured
    steps:
      - run: { command: "reformime --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }

  - name: sendmail --help is structured
    steps:
      - run: { command: "sendmail --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }
