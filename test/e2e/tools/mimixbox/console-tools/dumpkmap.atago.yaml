# Migrated from mimixbox's ShellSpec test/it/spec/dumpkmap_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: dumpkmap" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox dumpkmap

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: dumpkmap --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: dumpkmap"
          stderr:
            empty: true
