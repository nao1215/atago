# Migrated from mimixbox's ShellSpec test/it/spec/ts_spec.sh.
version: "1"

suite:
  name: mimixbox ts

scenarios:
  - name: prefixes each line with a timestamp
    steps:
      # Each line gets a YYYY-MM-DD HH:MM:SS prefix; check the shape, not the
      # value. printf ... | ts | grep -cE → needs a pipe.
      - run:
          shell: true
          command: printf 'alpha\nbeta\n' | ts | grep -cE '^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2} (alpha|beta)$'
      - assert:
          exit_code: 0
          stdout:
            equals: "2"
