# Migrated from mimixbox's ShellSpec test/it/spec/setfont_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: setfont" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox setfont

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: setfont --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: setfont"
          stderr:
            empty: true
