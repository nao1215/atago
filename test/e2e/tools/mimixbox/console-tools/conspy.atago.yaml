# Migrated from mimixbox's ShellSpec test/it/spec/conspy_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: conspy" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox conspy

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: conspy --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: conspy"
          stderr:
            empty: true
