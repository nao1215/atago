# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_console-tools_spec.sh.
# Per-command --help contract specs for console-tools commands (issue #489).
# Each helper runs `env -- <cmd> --help` and asserts the structured --help
# (status success, output includes 'Usage:').
version: "1"

suite:
  name: mimixbox console-tools --help contract

scenarios:
  - name: adjtimex --help is structured
    steps:
      - run:
          command: adjtimex --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

  - name: conspy --help is structured
    steps:
