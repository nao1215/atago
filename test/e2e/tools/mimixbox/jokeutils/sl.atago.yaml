# Migrated from mimixbox's ShellSpec test/it/spec/sl_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: sl" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox sl

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: sl --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: sl"
          stderr:
            empty: true
