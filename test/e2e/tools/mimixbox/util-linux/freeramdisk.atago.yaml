# Migrated from mimixbox's ShellSpec test/it/spec/freeramdisk_spec.sh.
# Freeing a ramdisk needs the device + privilege; the e2e exercises the
# no-device path. The ioctl dispatch is unit-tested.
version: "1"

suite:
  name: mimixbox freeramdisk

scenarios:
  - name: requires a device
    steps:
      # ShellSpec asserted rc=1; direct exec on the error path.
      - run:
          command: freeramdisk
      - assert:
          exit_code: { not: 0 }

  - name: describes itself with --help
    steps:
      - run:
          command: freeramdisk --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage: freeramdisk"
              - "ramdisk"
