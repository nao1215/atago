# Migrated from mimixbox's ShellSpec test/it/spec/fsck_minix_spec.sh.
version: "1"

suite:
  name: mimixbox fsck.minix

scenarios:
  - name: validates a freshly made Minix filesystem
    steps:
      - run:
          shell: true
          command: >-
            dd if=/dev/zero of=f.img bs=1024 count=2048 2>/dev/null;
            mkfs.minix f.img >/dev/null;
            fsck.minix f.img | sed -n '1p'
      - assert:
          exit_code: 0
          stdout:
            contains: "Minix v1"

  - name: rejects a non-Minix image
    steps:
      # ShellSpec captured rc=1; assert the exit code directly.
      - run:
          shell: true
          command: dd if=/dev/zero of=b.img bs=1024 count=4 2>/dev/null; fsck.minix b.img
      - assert:
          exit_code: { not: 0 }
