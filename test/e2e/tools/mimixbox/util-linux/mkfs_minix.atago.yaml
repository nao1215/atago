# Migrated from mimixbox's ShellSpec test/it/spec/mkfs_minix_spec.sh.
version: "1"

suite:
  name: mimixbox mkfs.minix

scenarios:
  - name: writes the Minix v1 magic
    steps:
      - run:
          shell: true
          command: >
            dd if=/dev/zero of=m.img bs=1024 count=2048 2>/dev/null;
            mkfs.minix m.img >/dev/null;
            dd if=m.img bs=1 skip=1040 count=2 2>/dev/null | od -An -tx1 | tr -d ' \n'
      - assert:
          exit_code: 0
          stdout:
            equals: "7f13"

  - name: refuses a too-small device
    steps:
      - run:
          shell: true
          command: dd if=/dev/zero of=s.img bs=1024 count=4 2>/dev/null
      - run:
          command: mkfs.minix s.img
      - assert:
          exit_code: { not: 0 }
