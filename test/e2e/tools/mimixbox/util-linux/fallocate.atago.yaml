# Migrated from mimixbox's ShellSpec test/it/spec/fallocate_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: fallocate" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox fallocate

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: fallocate --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: fallocate"
          stderr:
            empty: true
