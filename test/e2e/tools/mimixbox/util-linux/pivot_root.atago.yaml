# Migrated from mimixbox's ShellSpec test/it/spec/pivot_root_spec.sh.
# pivot_root needs privilege; the e2e exercises argument validation and --help.
version: "1"

suite:
  name: mimixbox pivot_root

scenarios:
  - name: requires two directories
    steps:
      - run:
          command: pivot_root /onlyone
      - assert:
          exit_code: { not: 0 }

  - name: describes itself with --help
    steps:
      - run:
          command: pivot_root --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage: pivot_root"
              - "root"
