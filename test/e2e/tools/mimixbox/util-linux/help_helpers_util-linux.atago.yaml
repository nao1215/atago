# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_util-linux_spec.sh.
# Per-command --help contract specs (issue #489): each util-linux applet exposes
# a dedicated --help helper that exits 0 and prints a "Usage:" line. The helpers
# invoke `env -- '<cmd>' --help` (a simple single command → direct exec).
version: "1"

suite:
  name: mimixbox util-linux --help helpers

scenarios:
  - name: fallocate --help is structured
    steps:
      - run:
          command: env -- fallocate --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

  - name: fsck.minix --help is structured
    steps:
      - run:
          command: env -- fsck.minix --help
      - assert:
          exit_code: 0
