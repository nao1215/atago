# Migrated from mimixbox's ShellSpec test/it/spec/setuidgid_spec.sh
# (+ runit/setuidgid_test.sh). Dropping to another user's uid/gid needs
# privilege; the e2e exercises the unknown-user and arg-count failure paths.
version: "1"

suite:
  name: mimixbox setuidgid

scenarios:
  - name: fails for an unknown user
    steps:
      - run:
          command: setuidgid nonexistent_user_xyz true
      - assert:
          exit_code: { not: 0 }

  - name: requires a program
    steps:
      - run:
          command: setuidgid root
      - assert:
          exit_code: { not: 0 }
