# Migrated from mimixbox's ShellSpec test/it/spec/rmmod_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: rmmod" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox rmmod

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: rmmod --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: rmmod"
          stderr:
            empty: true
