# Migrated from mimixbox's ShellSpec test/it/spec/adduser_spec.sh
# (+ loginutils/adduser_test.sh). Writing the account databases needs privilege;
# the e2e exercises the deterministic no-argument path and --help.
version: "1"

suite:
  name: mimixbox adduser

scenarios:
  - name: requires a user name
    steps:
      - run:
          command: adduser
      - assert:
          exit_code: { not: 0 }

  - name: describes itself with --help
    steps:
      - run:
          command: adduser --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage: adduser"
              - "account"
