# Migrated from mimixbox's ShellSpec test/it/spec/run-init_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: run-init" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox run-init

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: run-init --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: run-init"
          stderr:
            empty: true
