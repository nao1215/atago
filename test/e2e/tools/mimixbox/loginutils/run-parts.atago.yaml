# Migrated from mimixbox's ShellSpec test/it/spec/run-parts_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: run-parts" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox run-parts

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: run-parts --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: run-parts"
          stderr:
            empty: true
