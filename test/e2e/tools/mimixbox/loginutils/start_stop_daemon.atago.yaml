# Migrated from mimixbox's ShellSpec test/it/spec/start_stop_daemon_spec.sh
# (+ loginutils/start_stop_daemon_test.sh). start-stop-daemon launches a program
# in the background (-S) and stops it (-K); the no-mode path is the failure.
version: "1"

suite:
  name: mimixbox start-stop-daemon

scenarios:
  - name: starts and stops a background program
    steps:
      # Multi-statement script (var assignment, background start, poll loop) ->
      # shell:true. SIGTERM delivery is asynchronous, so poll until the process
      # is gone before reporting 'stopped'.
      - run:
          shell: true
          command: |
            p="${workdir}/foo.pid"
            start-stop-daemon -S -p "$p" -x /bin/sleep -- 30 >/dev/null 2>&1
            pid=$(cat "$p")
            start-stop-daemon -K -p "$p" >/dev/null 2>&1
            i=0
            while [ "$i" -lt 50 ] && kill -0 "$pid" 2>/dev/null; do
                sleep 0.1
                i=$((i + 1))
            done
            if kill -0 "$pid" 2>/dev/null; then echo alive; else echo "stopped"; fi
      - assert:
          exit_code: 0
          stdout:
            equals: "stopped"

  - name: requires a start or stop mode
    steps:
      - run:
          command: start-stop-daemon -p /tmp/x
      - assert:
          exit_code: { not: 0 }
