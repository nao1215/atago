# Migrated from mimixbox's ShellSpec test/it/spec/addgroup_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: addgroup" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox addgroup

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: addgroup --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: addgroup"
          stderr:
            empty: true
