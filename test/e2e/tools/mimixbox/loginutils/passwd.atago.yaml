# Migrated from mimixbox's ShellSpec test/it/spec/passwd_spec.sh
# (+ loginutils/passwd_test.sh). Writing /etc/shadow needs privilege; the e2e
# exercises the deterministic conflicting-flags path and --help.
version: "1"

suite:
  name: mimixbox passwd

scenarios:
  - name: rejects conflicting flags
    steps:
      - run:
          command: passwd -l -u alice
      - assert:
          exit_code: { not: 0 }

  - name: describes itself with --help
    steps:
      - run:
          command: passwd --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage: passwd"
              - "password"
