# Migrated from mimixbox's ShellSpec test/it/spec/group_spec.sh
# (+ loginutils/group_test.sh). Writing /etc/group needs privilege; the e2e
# exercises the deterministic no-argument paths for addgroup and delgroup.
version: "1"

suite:
  name: mimixbox addgroup / delgroup

scenarios:
  - name: addgroup requires a group name
    steps:
      - run:
          command: addgroup
      - assert:
          exit_code: { not: 0 }

  - name: delgroup requires a group name
    steps:
      - run:
          command: delgroup
      - assert:
          exit_code: { not: 0 }
