# Migrated from mimixbox's ShellSpec test/it/spec/su_spec.sh
# (+ loginutils/su_test.sh). Switching users needs privilege and real auth; the
# e2e exercises the deterministic unknown-user path and --help.
version: "1"

suite:
  name: mimixbox su

scenarios:
  - name: fails for an unknown user
    steps:
      # Error case -> direct exec. su reads a password from stdin.
      - run:
          command: su nonexistent_user_xyz
          stdin: "\n"
      - assert:
          exit_code: { not: 0 }

  - name: describes itself with --help
    steps:
      - run:
          command: su --help
      - assert:
          exit_code: 0
          stdout:
            contains:
              - "Usage: su"
              - "user"
