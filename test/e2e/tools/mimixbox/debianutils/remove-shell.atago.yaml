# Migrated from mimixbox's ShellSpec test/it/spec/remove-shell_spec.sh
# (+ debianutils/remove-shell_test.sh). remove-shell mutates /etc/shells
# (privileged), so the ShellSpec only exercises the --help contract and the
# no-operand error. Both are single commands → direct exec.
version: "1"

suite:
  name: mimixbox remove-shell

scenarios:
  - name: prints usage with --help and exits 0
    steps:
      - run:
          command: remove-shell --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: remove-shell"

  - name: fails with a message when given no operand
    steps:
      - run:
          command: remove-shell
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "remove-shell"
