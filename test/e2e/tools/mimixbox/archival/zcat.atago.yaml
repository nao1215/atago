# Migrated from mimixbox's ShellSpec test/it/spec/zcat_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: zcat" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox zcat

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: zcat --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: zcat"
          stderr:
            empty: true
