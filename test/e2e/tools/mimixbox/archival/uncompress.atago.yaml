# Migrated from mimixbox's ShellSpec test/it/spec/uncompress_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: uncompress" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox uncompress

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: uncompress --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: uncompress"
          stderr:
            empty: true
