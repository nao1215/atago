# Migrated from mimixbox's ShellSpec test/it/spec/unzip_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: unzip" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox unzip

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: unzip --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: unzip"
          stderr:
            empty: true
