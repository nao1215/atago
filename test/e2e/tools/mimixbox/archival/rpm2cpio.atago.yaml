# Migrated from mimixbox's ShellSpec test/it/spec/rpm2cpio_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: rpm2cpio" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox rpm2cpio

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: rpm2cpio --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: rpm2cpio"
          stderr:
            empty: true
