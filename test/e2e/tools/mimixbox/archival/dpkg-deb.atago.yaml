# Migrated from mimixbox's ShellSpec test/it/spec/dpkg-deb_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: dpkg-deb" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox dpkg-deb

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: dpkg-deb --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: dpkg-deb"
          stderr:
            empty: true
