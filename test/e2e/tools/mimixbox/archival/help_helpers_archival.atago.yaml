# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_archival_spec.sh
# (+ archival/<cmd>_test.sh). Each helper runs `<cmd> --help` (the ShellSpec
# `env -- '<cmd>' --help`) and asserts a structured help banner. Simple single
# commands -> direct exec, no shell.
version: "1"

suite:
  name: mimixbox archival commands expose a dedicated --help helper

scenarios:
  - name: bzcat --help is structured
    steps:
      - run: { command: "bzcat --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }

  - name: bzip2 --help is structured
    steps:
      - run: { command: "bzip2 --help" }
      - assert: { exit_code: 0 }
      - assert: { stdout: { contains: "Usage:" } }

