# Migrated from mimixbox's ShellSpec test/it/spec/xz_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: xz" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox xz

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: xz --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: xz"
          stderr:
            empty: true
