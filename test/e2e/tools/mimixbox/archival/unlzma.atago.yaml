# Migrated from mimixbox's ShellSpec test/it/spec/unlzma_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: unlzma" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox unlzma

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: unlzma --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: unlzma"
          stderr:
            empty: true
