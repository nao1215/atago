# Migrated from mimixbox's ShellSpec test/it/spec/date_spec.sh (+ shellutils/date_test.sh).
version: "1"

suite:
  name: mimixbox date

scenarios:
  - name: formats the date portion of an epoch
    steps:
      - run:
          command: date -u -d @0 +%F
      - assert:
          exit_code: 0
          stdout:
            equals: "1970-01-01"

  - name: formats the time portion of an epoch
    steps:
      - run:
          command: date -u -d @0 +%T
      - assert:
          exit_code: 0
          stdout:
            equals: "00:00:00"

  - name: prints a literal percent sign
    steps:
      - run:
          command: date +%%
      - assert:
          exit_code: 0
          stdout:
            equals: "%"

  - name: prints a four-digit year
    steps:
      - run:
          shell: true
          command: date +%Y | grep -E '^[0-9]{4}$' > /dev/null && echo "ok"
      - assert:
          exit_code: 0
          stdout:
            equals: "ok"
