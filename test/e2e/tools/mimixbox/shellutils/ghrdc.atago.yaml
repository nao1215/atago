# Migrated from mimixbox's ShellSpec test/it/spec/ghrdc_spec.sh (+ shellutils/ghrdc_test.sh).
version: "1"

suite:
  name: mimixbox ghrdc

scenarios:
  - name: prints usage with --help and exits 0
    steps:
      - run:
          command: ghrdc --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: ghrdc"

  - name: fails with a message when given no operand
    steps:
      - run:
          command: ghrdc
      - assert:
          exit_code: { not: 0 }
          stderr:
            contains: "ghrdc"
