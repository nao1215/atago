# Migrated from mimixbox's ShellSpec test/it/spec/time_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: time" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox time

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: time --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: time"
          stderr:
            empty: true
