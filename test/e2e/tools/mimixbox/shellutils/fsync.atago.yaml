# Migrated from mimixbox's ShellSpec test/it/spec/fsync_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: fsync" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox fsync

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: fsync --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: fsync"
          stderr:
            empty: true
