# Migrated from mimixbox's ShellSpec test/it/spec/env_spec.sh (+ shellutils/env_test.sh).
version: "1"

suite:
  name: mimixbox env

scenarios:
  - name: adds the assignment to the printed environment
    steps:
      - run:
          shell: true
          command: env FOO=bar | grep '^FOO=bar$'
      - assert:
          exit_code: 0
          stdout:
            equals: "FOO=bar"

  - name: -i prints only the given assignment
    steps:
      - run:
          command: env -i ONLY=here
      - assert:
          exit_code: 0
          stdout:
            equals: "ONLY=here"

  - name: passes the variable to the run command
    steps:
      - run:
          command: env GREETING=hi sh -c 'echo $GREETING'
      - assert:
          exit_code: 0
          stdout:
            equals: "hi"
