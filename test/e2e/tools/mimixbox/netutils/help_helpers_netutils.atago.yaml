# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_netutils_spec.sh
# (+ netutils/<cmd>_test.sh for each command below).
# Per-command --help contract specs (issue #489): each command's --help exits 0
# and prints a 'Usage:' line. The ShellSpec wrapped each in 'env -- CMD --help';
# direct exec of CMD --help is the equivalent.
version: "1"

suite:
  name: mimixbox netutils --help helpers

scenarios:
  - name: arp --help is structured
    steps:
      - run:
          command: arp --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

