# Migrated from mimixbox's ShellSpec test/it/spec/route_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: route" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox route

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: route --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: route"
          stderr:
            empty: true
