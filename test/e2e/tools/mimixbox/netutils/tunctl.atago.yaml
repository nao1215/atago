# Migrated from mimixbox's ShellSpec test/it/spec/tunctl_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: tunctl" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox tunctl

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: tunctl --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: tunctl"
          stderr:
            empty: true
