# Migrated from mimixbox's ShellSpec test/it/spec/traceroute_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: traceroute" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox traceroute

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: traceroute --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: traceroute"
          stderr:
            empty: true
