# Migrated from mimixbox's ShellSpec test/it/spec/arping_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: arping" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox arping

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: arping --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: arping"
          stderr:
            empty: true
