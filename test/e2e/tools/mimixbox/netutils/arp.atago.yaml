# Migrated from mimixbox's ShellSpec test/it/spec/arp_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: arp" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox arp

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: arp --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: arp"
          stderr:
            empty: true
