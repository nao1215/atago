# Migrated from mimixbox's ShellSpec test/it/spec/ifenslave_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: ifenslave" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox ifenslave

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: ifenslave --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: ifenslave"
          stderr:
            empty: true
