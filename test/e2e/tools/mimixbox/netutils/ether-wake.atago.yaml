# Migrated from mimixbox's ShellSpec test/it/spec/ether-wake_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: ether-wake" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox ether-wake

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: ether-wake --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: ether-wake"
          stderr:
            empty: true
