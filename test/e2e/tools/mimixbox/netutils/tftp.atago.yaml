# Migrated from mimixbox's ShellSpec test/it/spec/tftp_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: tftp" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox tftp

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: tftp --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: tftp"
          stderr:
            empty: true
