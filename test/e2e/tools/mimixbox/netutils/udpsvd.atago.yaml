# Migrated from mimixbox's ShellSpec test/it/spec/udpsvd_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: udpsvd" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox udpsvd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: udpsvd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: udpsvd"
          stderr:
            empty: true
