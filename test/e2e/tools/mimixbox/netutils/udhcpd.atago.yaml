# Migrated from mimixbox's ShellSpec test/it/spec/udhcpd_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: udhcpd" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox udhcpd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: udhcpd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: udhcpd"
          stderr:
            empty: true
