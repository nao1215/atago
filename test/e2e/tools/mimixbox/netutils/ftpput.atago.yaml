# Migrated from mimixbox's ShellSpec test/it/spec/ftpput_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: ftpput" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox ftpput

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: ftpput --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: ftpput"
          stderr:
            empty: true
