# Migrated from mimixbox's ShellSpec test/it/spec/slattach_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: slattach" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox slattach

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: slattach --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: slattach"
          stderr:
            empty: true
