# Migrated from mimixbox's ShellSpec test/it/spec/dnsdomainname_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: dnsdomainname" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox dnsdomainname

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: dnsdomainname --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: dnsdomainname"
          stderr:
            empty: true
