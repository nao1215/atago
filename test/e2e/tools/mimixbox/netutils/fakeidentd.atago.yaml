# Migrated from mimixbox's ShellSpec test/it/spec/fakeidentd_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: fakeidentd" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox fakeidentd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: fakeidentd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: fakeidentd"
          stderr:
            empty: true
