# Migrated from mimixbox's ShellSpec test/it/spec/ifplugd_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: ifplugd" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox ifplugd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: ifplugd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: ifplugd"
          stderr:
            empty: true
