# Migrated from mimixbox's ShellSpec test/it/spec/dumpleases_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: dumpleases" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox dumpleases

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: dumpleases --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: dumpleases"
          stderr:
            empty: true
