# Migrated from mimixbox's ShellSpec test/it/spec/telnetd_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: telnetd" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox telnetd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: telnetd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: telnetd"
          stderr:
            empty: true
