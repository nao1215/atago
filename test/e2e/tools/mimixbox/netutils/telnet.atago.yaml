# Migrated from mimixbox's ShellSpec test/it/spec/telnet_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: telnet" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox telnet

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: telnet --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: telnet"
          stderr:
            empty: true
