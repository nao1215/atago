# Migrated from mimixbox's ShellSpec test/it/spec/dhcprelay_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: dhcprelay" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox dhcprelay

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: dhcprelay --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: dhcprelay"
          stderr:
            empty: true
