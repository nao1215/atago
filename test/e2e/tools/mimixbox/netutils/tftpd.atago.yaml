# Migrated from mimixbox's ShellSpec test/it/spec/tftpd_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: tftpd" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox tftpd

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: tftpd --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: tftpd"
          stderr:
            empty: true
