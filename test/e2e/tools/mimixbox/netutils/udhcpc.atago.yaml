# Migrated from mimixbox's ShellSpec test/it/spec/udhcpc_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: udhcpc" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox udhcpc

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: udhcpc --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: udhcpc"
          stderr:
            empty: true
