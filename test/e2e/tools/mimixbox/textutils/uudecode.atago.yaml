# Migrated from mimixbox's ShellSpec test/it/spec/uudecode_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: uudecode" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox uudecode

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: uudecode --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: uudecode"
          stderr:
            empty: true
