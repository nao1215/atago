# Migrated from mimixbox's ShellSpec test/it/spec/shuf_spec.sh (+ textutils/shuf_test.sh).
# `shuf -i 1-1` is a simple single command, so use direct exec.
version: "1"

suite:
  name: mimixbox shuf

scenarios:
  - name: shuffles a single-element range
    steps:
      - run:
          command: shuf -i 1-1
      - assert:
          exit_code: 0
          stdout:
            equals: "1"
