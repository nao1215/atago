# Migrated from mimixbox's ShellSpec test/it/spec/dos2unix_spec.sh
# (+ textutils/dos2unix_test.sh). Setup builds 1.txt/2.txt/3.txt under a
# dos2unix/ subdir, each "abc/def/ghi" with CRLF line endings; here fixtures
# build them under dos2unix/ in the scenario workdir.
#
# The "change LF" bodies run two commands (`dos2unix file; file file`), so they
# use shell: true. Both dos2unix's "converting..." message AND the `file`
# classification go to stdout (verified against the real applet), so the
# ShellSpec `The output should equal` mapping holds. The directory / mixed
# failure cases are single dos2unix commands, so they use direct exec to surface
# the real non-zero exit; their "skip ... not regular file" line goes to stderr.
version: "1"

suite:
  name: mimixbox dos2unix

scenarios:
  - name: convert a CRLF file to LF and reclassify it
    steps:
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - run:
          shell: true
          command: |
            dos2unix "${workdir}/dos2unix/1.txt"
            file "${workdir}/dos2unix/1.txt"
      - assert:
          stdout:
            equals: |
              dos2unix: converting file ${workdir}/dos2unix/1.txt to Unix format...
              ${workdir}/dos2unix/1.txt: ASCII text

  - name: convert a CRLF file and exit success
    steps:
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - run:
          shell: true
          command: dos2unix "${workdir}/dos2unix/1.txt"
      - assert:
          exit_code: 0
          stdout:
            equals: "dos2unix: converting file ${workdir}/dos2unix/1.txt to Unix format..."

  - name: convert three CRLF files at once and reclassify each
    steps:
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - fixture:
          file: dos2unix/2.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - fixture:
          file: dos2unix/3.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - run:
          shell: true
          command: |
            dos2unix "${workdir}/dos2unix/1.txt" "${workdir}/dos2unix/2.txt" "${workdir}/dos2unix/3.txt"
            file "${workdir}/dos2unix/1.txt"
            file "${workdir}/dos2unix/2.txt"
            file "${workdir}/dos2unix/3.txt"
      - assert:
          stdout:
            equals: |
              dos2unix: converting file ${workdir}/dos2unix/1.txt to Unix format...
              dos2unix: converting file ${workdir}/dos2unix/2.txt to Unix format...
              dos2unix: converting file ${workdir}/dos2unix/3.txt to Unix format...
              ${workdir}/dos2unix/1.txt: ASCII text
              ${workdir}/dos2unix/2.txt: ASCII text
              ${workdir}/dos2unix/3.txt: ASCII text

  - name: convert three CRLF files at once and exit success
    steps:
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - fixture:
          file: dos2unix/2.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - fixture:
          file: dos2unix/3.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - run:
          shell: true
          command: dos2unix "${workdir}/dos2unix/1.txt" "${workdir}/dos2unix/2.txt" "${workdir}/dos2unix/3.txt"
      - assert:
          exit_code: 0
          stdout:
            equals: |
              dos2unix: converting file ${workdir}/dos2unix/1.txt to Unix format...
              dos2unix: converting file ${workdir}/dos2unix/2.txt to Unix format...
              dos2unix: converting file ${workdir}/dos2unix/3.txt to Unix format...

  - name: refuse a directory with a not-regular-file error
    steps:
      # A regular file under dos2unix/ ensures the subdir exists; the command
      # targets the directory itself. Single command -> direct exec for the real
      # non-zero exit.
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - run:
          command: dos2unix ${workdir}/dos2unix
      - assert:
          exit_code: { not: 0 }
          stderr:
            equals: "dos2unix: skip ${workdir}/dos2unix: not regular file"

  - name: convert the two files but fail on the directory operand
    steps:
      - fixture:
          file: dos2unix/1.txt
          content: "abc\r\ndef\r\nghi\r\n"
      - fixture:
          file: dos2unix/3.txt
          content: "abc\r\ndef\r\nghi\r\n"
      # Two files + one directory is still a single dos2unix command -> direct
      # exec. Converted files print to stdout; the skipped directory to stderr.
      - run:
          command: dos2unix ${workdir}/dos2unix/1.txt ${workdir}/dos2unix ${workdir}/dos2unix/3.txt
      - assert:
          exit_code: { not: 0 }
          stdout:
            equals: |
              dos2unix: converting file ${workdir}/dos2unix/1.txt to Unix format...
              dos2unix: converting file ${workdir}/dos2unix/3.txt to Unix format...
          stderr:
            equals: "dos2unix: skip ${workdir}/dos2unix: not regular file"
