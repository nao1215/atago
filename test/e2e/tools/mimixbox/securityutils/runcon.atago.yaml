# Migrated from mimixbox's ShellSpec test/it/spec/runcon_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: runcon" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox runcon

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: runcon --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: runcon"
          stderr:
            empty: true
