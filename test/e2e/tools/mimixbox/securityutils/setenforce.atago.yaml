# Migrated from mimixbox's ShellSpec test/it/spec/setenforce_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: setenforce" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox setenforce

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: setenforce --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: setenforce"
          stderr:
            empty: true
