# Migrated from mimixbox's ShellSpec test/it/spec/help_helpers_securityutils_spec.sh
# (+ securityutils/<cmd>_test.sh). Each helper is `env -- '<cmd>' --help`; the
# --help contract prints a "Usage:" line to stdout and exits 0. Direct exec.
version: "1"

suite:
  name: mimixbox securityutils --help contract

scenarios:
  - name: chcon --help is structured
    steps:
      - run:
          command: chcon --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage:"

