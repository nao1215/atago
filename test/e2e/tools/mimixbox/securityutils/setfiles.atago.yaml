# Migrated from mimixbox's ShellSpec test/it/spec/setfiles_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: setfiles" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox setfiles

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: setfiles --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: setfiles"
          stderr:
            empty: true
