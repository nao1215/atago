# Migrated from mimixbox's ShellSpec test/it/spec/setsebool_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: setsebool" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox setsebool

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: setsebool --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: setsebool"
          stderr:
            empty: true
