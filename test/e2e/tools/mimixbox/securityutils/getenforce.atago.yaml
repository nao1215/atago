# Migrated from mimixbox's ShellSpec test/it/spec/getenforce_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: getenforce" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox getenforce

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: getenforce --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: getenforce"
          stderr:
            empty: true
