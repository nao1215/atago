# Migrated from mimixbox's ShellSpec test/it/spec/sestatus_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: sestatus" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox sestatus

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: sestatus --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: sestatus"
          stderr:
            empty: true
