# Migrated from mimixbox's ShellSpec test/it/spec/zip-pwcrack_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: zip-pwcrack" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox zip-pwcrack

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: zip-pwcrack --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: zip-pwcrack"
          stderr:
            empty: true
