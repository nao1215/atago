# Migrated from mimixbox's ShellSpec test/it/spec/selinuxenabled_spec.sh (no helper; inline).
# Universal --help contract (Issue #477): exit 0, "Usage: selinuxenabled" on stdout,
# empty stderr. Privileged/networked/destructive applet exercised via --help only.
version: "1"

suite:
  name: mimixbox selinuxenabled

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: selinuxenabled --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: selinuxenabled"
          stderr:
            empty: true
