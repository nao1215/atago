# Migrated from mimixbox's ShellSpec test/it/spec/chcon_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: chcon" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox chcon

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: chcon --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: chcon"
          stderr:
            empty: true
