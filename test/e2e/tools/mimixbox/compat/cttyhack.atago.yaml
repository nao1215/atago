# Migrated from mimixbox's ShellSpec test/it/spec/cttyhack_spec.sh (no helper; inline --help contract).
# Universal --help contract (Issue #477): exit 0, "Usage: cttyhack" on stdout, empty stderr.
version: "1"

suite:
  name: mimixbox cttyhack

scenarios:
  - name: describes itself with --help
    steps:
      - run:
          command: cttyhack --help
      - assert:
          exit_code: 0
          stdout:
            contains: "Usage: cttyhack"
          stderr:
            empty: true
