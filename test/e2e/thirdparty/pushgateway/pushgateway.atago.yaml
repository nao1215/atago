version: "1"

suite:
  name: pushgateway (self-hosted metrics gateway)

# Exercises Prometheus Pushgateway (from awesome-selfhosted's monitoring
# corner) as a third-party target. Its push API takes the raw text exposition
# format — the workload the http step's `body:` payload exists for. Install:
#   go install github.com/prometheus/pushgateway@latest
#
# Each scenario binds its own port so the suite runs under the default
# scenario concurrency.

permissions:
  network:
    allow: [127.0.0.1]

runners:
  push:
    type: http
    base_url: http://127.0.0.1:18092
    timeout: 10s
  push2:
    type: http
    base_url: http://127.0.0.1:18093
    timeout: 10s
  push3:
    type: http
    base_url: http://127.0.0.1:18099
    timeout: 10s
  push4:
    type: http
    base_url: http://127.0.0.1:18100
    timeout: 10s
  push5:
    type: http
    base_url: http://127.0.0.1:18101
    timeout: 10s

scenarios:
  - name: a pushed metric appears on the scrape endpoint
    services:
      - name: pushgateway
        command: pushgateway --web.listen-address=127.0.0.1:18092
        ready:
          port: 127.0.0.1:18092
          timeout: 15s
    steps:
      # The push API takes the raw Prometheus text exposition format.
      - http:
          runner: push
          method: POST
          path: /metrics/job/atago_e2e
          body: |
            # TYPE atago_e2e_metric gauge
            atago_e2e_metric 3.14
      - assert:
          status: 200
      - http:
          runner: push
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            contains: job="atago_e2e"
      # The scrape output decorates the metric with its group labels.
      - assert:
          body:
            matches: "atago_e2e_metric\\{[^}]*job=\"atago_e2e\"[^}]*\\} 3.14"

  - name: deleting a job group removes its metrics
    services:
      - name: pushgateway
        command: pushgateway --web.listen-address=127.0.0.1:18093
        ready:
          port: 127.0.0.1:18093
          timeout: 15s
    steps:
      - http:
          runner: push2
          method: POST
          path: /metrics/job/ephemeral
          body: |
            ephemeral_metric 1
      - assert:
          status: 200
      - http:
          runner: push2
          method: DELETE
          path: /metrics/job/ephemeral
      - assert:
          status: 202
      - http:
          runner: push2
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            not_contains: ephemeral_metric

  - name: a malformed exposition body is rejected and never ingested
    services:
      - name: pushgateway
        command: pushgateway --web.listen-address=127.0.0.1:18099
        ready:
          port: 127.0.0.1:18099
          timeout: 15s
    steps:
      # A line that is not valid exposition format is a 400, with the parser's
      # reason on the body. This is the failure branch the happy pushes lack.
      - http:
          runner: push3
          method: POST
          path: /metrics/job/badjob
          body: |
            this is not a metric line
      - assert:
          status: 400
          body:
            contains: "text format parsing error"
      # Negative space: the rejected input is not silently stored — a later
      # scrape shows no trace of the bad job.
      - http:
          runner: push3
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            not_contains: 'job="badjob"'

  - name: POST merges into a group while PUT replaces it
    services:
      - name: pushgateway
        command: pushgateway --web.listen-address=127.0.0.1:18100
        ready:
          port: 127.0.0.1:18100
          timeout: 15s
    steps:
      # State-transition + metamorphic: the two write verbs have different group
      # semantics. POST metric_a, then POST metric_b to the same group — POST
      # merges, so both survive.
      - http:
          runner: push4
          method: POST
          path: /metrics/job/svc
          body: |
            metric_a 1
      - assert:
          status: 200
      - http:
          runner: push4
          method: POST
          path: /metrics/job/svc
          body: |
            metric_b 2
      - assert:
          status: 200
      - http:
          runner: push4
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            contains:
              - metric_a
              - metric_b
      # PUT replaces the whole group: after it, only metric_c remains and the
      # merged metric_a/metric_b are gone.
      - http:
          runner: push4
          method: PUT
          path: /metrics/job/svc
          body: |
            metric_c 3
      - assert:
          status: 200
      - http:
          runner: push4
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            contains: metric_c
      - assert:
          body:
            not_contains:
              - metric_a
              - metric_b

  - name: a grouping label decorates every metric in the group
    services:
      - name: pushgateway
        command: pushgateway --web.listen-address=127.0.0.1:18101
        ready:
          port: 127.0.0.1:18101
          timeout: 15s
    steps:
      # A second grouping dimension: pushing under /job/svc/instance/host1
      # stamps instance="host1" onto the scraped sample, alongside job="svc".
      - http:
          runner: push5
          method: POST
          path: /metrics/job/svc/instance/host1
          body: |
            labeled_metric 9
      - assert:
          status: 200
      - http:
          runner: push5
          method: GET
          path: /metrics
      - assert:
          status: 200
          body:
            matches: 'labeled_metric\{[^}]*instance="host1"[^}]*job="svc"[^}]*\} 9'
