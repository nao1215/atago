version: "1"

suite:
  name: git (third-party CLI, no build required)

# atago's dogfood suites test CLIs the author maintains; this suite tests a CLI
# nobody here wrote. git is on every dev machine and CI runner, so it runs on
# Linux/macOS/Windows in CI as living proof that testing an arbitrary
# third-party CLI needs no test code — only observable behavior. Every command
# uses git's own -C/-c flags instead of a shell, so the same spec runs
# unchanged on every OS.
scenarios:
  - name: init creates an empty repository
    steps:
      - run:
          command: git init -q repo
      - assert:
          exit_code: 0
          file:
            path: repo/.git/HEAD
            contains: ref
      # A fresh repository has no commits yet: rev-parse fails loudly.
      - run:
          command: git -C repo rev-parse HEAD
      - assert:
          exit_code:
            not: 0

  - name: add and commit make the working tree clean
    steps:
      - fixture:
          file: repo-src/hello.txt
          content: "hello from atago"
      - run:
          command: git init -q repo-src
      - run:
          command: git -C repo-src add hello.txt
      - run:
          command: git -C repo-src -c user.name=atago -c user.email=atago@example.com commit -q -m "add hello"
      - assert:
          exit_code: 0
      # A committed tree reports no pending changes.
      - run:
          command: git -C repo-src status --porcelain
      - assert:
          exit_code: 0
          stdout:
            empty: true
      - run:
          command: git -C repo-src log --oneline
      - assert:
          stdout:
            contains: add hello

  - name: a captured commit hash flows into a later command
    steps:
      - fixture:
          file: r/f.txt
          content: "v1"
      - run:
          command: git init -q r
      - run:
          command: git -C r add f.txt
      - run:
          command: git -C r -c user.name=atago -c user.email=atago@example.com commit -q -m "first"
      - run:
          command: git -C r rev-parse HEAD
      - store:
          name: head
          from:
            stdout:
              matches: "[0-9a-f]{40}"
      - run:
          command: git -C r show --no-patch --format=%s ${head}
      - assert:
          exit_code: 0
          stdout:
            contains: first

  - name: "checking out a missing ref fails with an explanation (${ref})"
    matrix:
      - { ref: no-such-branch }
      - { ref: v9.9.9 }
    steps:
      - run:
          command: git init -q repo
      - run:
          command: git -C repo checkout ${ref}
      - assert:
          exit_code:
            not: 0
          stderr:
            contains: ${ref}
